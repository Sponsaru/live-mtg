<script id="sw-browser-editor-script">
(() => {
  'use strict';
  const params = new URLSearchParams(location.search);
  if (params.has('sw-render') || (navigator.webdriver && !params.has('edit'))) return;

  const state = { editing:false, dirty:false, imageTarget:null, svgInput:null, svgTarget:null,
    svgOriginalText:'', svgOriginalOpacity:'', svgWasDirty:false };
  const ui = document.createElement('div');
  ui.id = 'sw-browser-editor';
  ui.dataset.swEditorUi = 'true';
  ui.innerHTML = '<button type="button" data-action="toggle">編集</button><div class="sw-editor-tools"><span class="sw-editor-status">文字または画像をクリック</span><button type="button" data-action="save">HTMLを保存</button><button type="button" data-action="finish" hidden>保存して終了</button></div>';
  const imageInput = document.createElement('input');
  imageInput.type = 'file';
  imageInput.accept = 'image/*';
  imageInput.hidden = true;
  imageInput.dataset.swEditorUi = 'true';
  document.body.append(ui, imageInput);

  const toggle = ui.querySelector('[data-action="toggle"]');
  const save = ui.querySelector('[data-action="save"]');
  const finish = ui.querySelector('[data-action="finish"]');
  const status = ui.querySelector('.sw-editor-status');
  const saveBridge = window.__SLIDE_WORKER_SAVE_BRIDGE__ || null;
  if (saveBridge) {
    save.textContent = '保存';
    save.style.background = '#fff';
    save.style.color = '#202124';
    finish.hidden = false;
  }
  const containers = () => [...document.querySelectorAll('.slide, .sheet')];
  const blocked = 'script,style,noscript,svg,canvas,video,audio,iframe,[data-sw-edit="off"],[data-sw-editor-ui]';

  function setStatus(message) { status.textContent = message; }
  function hasDirectText(el) {
    return [...el.childNodes].some(node => node.nodeType === Node.TEXT_NODE && node.textContent.trim());
  }
  function editableElements() {
    const found = new Set();
    containers().forEach(container => {
      container.querySelectorAll('*').forEach(el => {
        if (el.matches(blocked) || el.closest(blocked)) return;
        if (hasDirectText(el)) found.add(el);
      });
    });
    const all = [...found];
    return all.filter(el => !all.some(parent => parent !== el && parent.contains(el)));
  }
  function imageElements() {
    const found = new Set();
    containers().forEach(container => {
      container.querySelectorAll('img').forEach(el => found.add(el));
      container.querySelectorAll('[style*="background-image"]').forEach(el => found.add(el));
    });
    return [...found];
  }
  function svgTextElements() {
    const found = [];
    containers().forEach(container => {
      container.querySelectorAll('svg text, svg tspan').forEach(el => {
        if (!hasDirectText(el)) return;
        if (el.querySelector('tspan')) return;
        found.push(el);
      });
    });
    return found;
  }
  function finishSvgTextEdit(commit = true) {
    if (!state.svgInput || !state.svgTarget) return;
    const input = state.svgInput;
    const target = state.svgTarget;
    const changed = input.value !== state.svgOriginalText;
    if (commit && changed) target.textContent = input.value;
    target.style.opacity = state.svgOriginalOpacity;
    if (!state.svgOriginalOpacity) target.style.removeProperty('opacity');
    input.remove();
    state.svgInput = null;
    state.svgTarget = null;
    if (commit && changed) markDirty();
    if (!commit) {
      state.dirty = state.svgWasDirty;
      setStatus(state.dirty ? '未保存の変更あり' : '変更を取り消しました');
    }
  }
  function beginSvgTextEdit(target) {
    finishSvgTextEdit(true);
    const rect = target.getBoundingClientRect();
    const computed = window.getComputedStyle(target);
    const input = document.createElement('input');
    const width = Math.max(180, rect.width + 96);
    const anchor = computed.textAnchor || target.getAttribute('text-anchor') || 'start';
    let left = rect.left - 8;
    if (anchor === 'middle') left = rect.left + rect.width / 2 - width / 2;
    if (anchor === 'end') left = rect.right - width + 8;
    input.type = 'text';
    input.className = 'sw-editor-svg-input';
    input.dataset.swEditorUi = 'true';
    input.value = target.textContent || '';
    Object.assign(input.style, {
      left:`${Math.max(4, left)}px`, top:`${Math.max(4, rect.top - 4)}px`,
      width:`${Math.max(80, Math.min(width, window.innerWidth - Math.max(4, left) - 4))}px`,
      height:`${Math.max(32, rect.height + 8)}px`,
      color:computed.fill === 'none' ? computed.color : computed.fill,
      fontFamily:computed.fontFamily, fontWeight:computed.fontWeight, fontStyle:computed.fontStyle,
      fontSize:`${Math.max(16, rect.height * .9)}px`, lineHeight:`${Math.max(32, rect.height + 8)}px`,
      textAlign:anchor === 'middle' ? 'center' : (anchor === 'end' ? 'right' : 'left')
    });
    state.svgInput = input;
    state.svgTarget = target;
    state.svgOriginalText = input.value;
    state.svgOriginalOpacity = target.style.opacity;
    state.svgWasDirty = state.dirty;
    target.style.opacity = '0';
    document.body.appendChild(input);
    input.addEventListener('input', () => {
      state.dirty = true;
      setStatus('未保存の変更あり');
    });
    input.addEventListener('blur', () => finishSvgTextEdit(true), { once:true });
    input.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        finishSvgTextEdit(true);
      } else if (event.key === 'Escape') {
        event.preventDefault();
        finishSvgTextEdit(false);
      }
    });
    input.focus();
    input.select();
  }
  function checkOverflow() {
    let count = 0;
    containers().forEach(el => {
      const overflow = el.scrollHeight > el.clientHeight + 2 || el.scrollWidth > el.clientWidth + 2;
      el.classList.toggle('sw-editor-overflow', overflow);
      if (overflow) count += 1;
    });
    if (count) setStatus(`はみ出し ${count}ページ`);
    return count;
  }
  function markDirty() {
    state.dirty = true;
    window.clearTimeout(markDirty.timer);
    markDirty.timer = window.setTimeout(() => {
      if (!checkOverflow()) setStatus('未保存の変更あり');
    }, 120);
  }
  function setEditing(on) {
    if (!on) finishSvgTextEdit(true);
    state.editing = on;
    document.body.classList.toggle('sw-browser-editing', on);
    ui.classList.toggle('is-editing', on);
    toggle.textContent = on ? '編集終了' : '編集';
    editableElements().forEach(el => {
      if (on) {
        el.contentEditable = 'true';
        el.spellcheck = true;
        el.dataset.swEditorEditable = 'true';
      } else {
        el.removeAttribute('contenteditable');
        el.removeAttribute('spellcheck');
        delete el.dataset.swEditorEditable;
      }
    });
    imageElements().forEach(el => {
      if (on) {
        el.dataset.swEditorImage = 'true';
      } else {
        delete el.dataset.swEditorImage;
      }
    });
    svgTextElements().forEach(el => {
      if (on) el.dataset.swEditorSvgText = 'true';
      else delete el.dataset.swEditorSvgText;
    });
    containers().forEach(el => el.classList.remove('sw-editor-overflow'));
    setStatus(on ? (saveBridge ? '直接更新モード｜文字または画像をクリック' : '文字または画像をクリック') : '');
  }
  function cleanClone() {
    finishSvgTextEdit(true);
    const clone = document.documentElement.cloneNode(true);
    clone.querySelectorAll('[data-sw-editor-ui]').forEach(el => el.remove());
    clone.querySelectorAll('[data-sw-editor-editable]').forEach(el => {
      el.removeAttribute('data-sw-editor-editable');
      el.removeAttribute('contenteditable');
      el.removeAttribute('spellcheck');
    });
    clone.querySelectorAll('[data-sw-editor-image]').forEach(el => {
      el.removeAttribute('data-sw-editor-image');
    });
    clone.querySelectorAll('[data-sw-editor-svg-text]').forEach(el => {
      el.removeAttribute('data-sw-editor-svg-text');
    });
    clone.querySelectorAll('.sw-editor-overflow').forEach(el => el.classList.remove('sw-editor-overflow'));
    clone.querySelector('body')?.classList.remove('sw-browser-editing');
    return '<!doctype html>\n' + clone.outerHTML + '\n';
  }
  function suggestedName() {
    const raw = decodeURIComponent(location.pathname.split('/').pop() || 'slide-worker.html');
    return raw.toLowerCase().endsWith('.html') ? raw : `${raw}.html`;
  }
  async function saveHtml(closeAfter = false) {
    const html = cleanClone();
    try {
      if (saveBridge) {
        const saveUrl = closeAfter ? `${saveBridge.saveUrl}?close=1` : saveBridge.saveUrl;
        const response = await fetch(saveUrl, {
          method:'POST',
          headers:{
            'Content-Type':'text/html; charset=utf-8',
            'X-Slide-Worker-Token':saveBridge.token
          },
          body:html
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.ok) throw new Error(result.error || '直接更新に失敗しました');
        state.dirty = false;
        if (closeAfter) {
          setEditing(false);
          setStatus('保存完了。このタブは閉じてOKです');
          save.disabled = true;
          finish.disabled = true;
          window.setTimeout(() => window.close(), 300);
        } else {
          setStatus('元ファイルを更新しました');
        }
        return;
      }
      if ('showSaveFilePicker' in window) {
        const handle = await window.showSaveFilePicker({
          suggestedName: suggestedName(),
          types: [{ description:'HTML', accept:{ 'text/html':['.html'] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(html);
        await writable.close();
        state.dirty = false;
        setStatus('保存しました');
        return;
      }
      const blob = new Blob([html], { type:'text/html;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = suggestedName();
      link.dataset.swEditorUi = 'true';
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(link.href), 1000);
      state.dirty = false;
      setStatus('編集済みHTMLをダウンロードしました');
    } catch (error) {
      if (error?.name !== 'AbortError') setStatus(error?.message || '保存できませんでした');
    }
  }

  const idleTimer = window.setTimeout(() => ui.classList.add('is-idle'), 2500);
  toggle.addEventListener('click', () => {
    window.clearTimeout(idleTimer);
    ui.classList.remove('is-idle');
    setEditing(!state.editing);
  });
  save.addEventListener('click', () => saveHtml(false));
  finish.addEventListener('click', () => saveHtml(true));
  document.addEventListener('input', event => {
    if (state.editing && event.target.closest('[data-sw-editor-editable]')) markDirty();
  });
  document.addEventListener('click', event => {
    if (!state.editing) return;
    const svgText = event.target.closest('[data-sw-editor-svg-text]');
    if (svgText) {
      event.preventDefault();
      event.stopPropagation();
      beginSvgTextEdit(svgText);
      return;
    }
    const target = event.target.closest('[data-sw-editor-image]');
    if (!target) return;
    event.preventDefault();
    event.stopPropagation();
    state.imageTarget = target;
    imageInput.value = '';
    imageInput.click();
  }, true);
  imageInput.addEventListener('change', () => {
    const file = imageInput.files?.[0];
    if (!file || !state.imageTarget) return;
    const reader = new FileReader();
    reader.onload = () => {
      if (state.imageTarget.tagName === 'IMG') state.imageTarget.src = reader.result;
      else state.imageTarget.style.backgroundImage = `url("${reader.result}")`;
      markDirty();
    };
    reader.readAsDataURL(file);
  });
  document.addEventListener('keydown', event => {
    const typing = event.target.closest('input,textarea,[contenteditable="true"]');
    if (!typing && event.key.toLowerCase() === 'e' && !event.metaKey && !event.ctrlKey && !event.altKey) {
      event.preventDefault();
      setEditing(!state.editing);
    }
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 's') {
      event.preventDefault();
      saveHtml();
    }
    if (event.key === 'Escape' && state.editing && !typing) setEditing(false);
  });
  window.addEventListener('beforeunload', event => {
    if (!state.dirty) return;
    event.preventDefault();
    event.returnValue = '';
  });
  if (saveBridge?.disconnectUrl) {
    window.addEventListener('pagehide', () => {
      const url = `${saveBridge.disconnectUrl}?token=${encodeURIComponent(saveBridge.token)}`;
      navigator.sendBeacon(url, '');
    });
  }
  if (saveBridge?.pingUrl) {
    const ping = () => fetch(saveBridge.pingUrl, {
      method:'POST',
      headers:{ 'X-Slide-Worker-Token':saveBridge.token }
    }).catch(() => {});
    ping();
    window.setInterval(ping, 2000);
  }
  if (params.has('edit')) setEditing(true);
})();
</script>
