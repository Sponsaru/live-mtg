<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<!--
  ■ このファイルは何か
    ai-trends-deck-neutral.html の「型」を固定したスライドパターン集。
    新しいデッキを作るときは、ここから該当パターンのスライド（.slide の div 丸ごと）を
    コピーして中身を差し替える。1スライド＝1パターン。ロゴ（.corp-logo）も各スライドに入っている。

  ■ 使い方のルール
    - 各スライド右上の「P00｜名前」タグ（.pt）は、実デッキでは削除する
    - 型のM=message（口頭説明前提）、I=informative（単体で読める）、B=both（両用）
    - hybridはデッキ全体でMとIを配合するが、1枚の中では混ぜない
    - 本文 font-size は 18px 以上。短く体言止め。キー数字は大きく（KPI型）
    - アイコンは文字サイズのインライン線画（.ib）のみ。バッジ型・単独配置は禁止
    - 画像は <img> に置換（.ph のプレースホルダを置換）。参照は assets/ 相対
    - グラフは単系列なら凡例なし・ラベルは要点1つだけ・グリッド線は極薄

  ■ テーマ（配色＋ロゴ＋背景）
    - 共有の正典は neutral（企業色なし）だけを持つ
    - 会社ごとの設定は各利用者が「ブランド設定.command」で個人作業場に保存し、
      デッキ生成時に private theme.css をこのCSSへ追記する（共有側には保存しない）
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #1d1d1f;           /* 本文テキスト（テーマ共通） */
    --ink2: #3a3a3d;
    --gray: #86868b;
    /* ▼ ここから下がテーマで切り替わる変数（既定＝neutral：モノクロ・企業色なし） */
    --panel: #f4f4f5;
    --line: #e4e4e7;
    --accent: #1d1d1f;        /* 主アクセント＝ブランド色（グラフの主役・チップ・hero） */
    --accent-ink: #2b2b2e;    /* アクセントの文字色（kick・アイコン・強調文字） */
    --accent-soft: #ececef;   /* 淡パネル（KPI・takeバー） */
    --accent2: #5c5c63;       /* 副アクセント */
    --accent2-soft: #f1f1f3;
    --mark: #e2e2e6;          /* ハイライト下地 */
    --bar: #b9b9bf;           /* グラフの通常マーク（主役は --accent） */
    --strong: #1d1d1f;        /* 濃色面（whyバー・番号丸・反転カード） */
    --bg-image: none;        /* 個人ブランド側で必要な場合だけ指定 */
    --logo: none;             /* 左下の会社ロゴ。テーマで url(…) を指定（neutral はロゴなし） */
    --logo-invert: none;      /* 反転スライド用の白抜きロゴ */

    /* ▼ ブランドの「ニュアンス」を保持するレイアウトトークン
       private theme.css から色と同じ要領で上書きする。既定値は従来CSSと同値。 */
    --radius-card: 1.375rem;          /* 標準カード／パネル */
    --radius-card-large: 1.75rem;     /* 大型KPI／ヒーローカード */
    --radius-card-medium: 1.25rem;    /* 図表／フロー */
    --radius-card-compact: 1.125rem;  /* 情報量が多いカード */
    --radius-card-soft: 1rem;         /* 小型カード */
    --radius-card-flat: 0.9rem;       /* 一覧／高密度カード */
    --radius-small: 0.625rem;         /* タグ／カード内要素 */
    --radius-pill: 61.25rem;          /* チップ。円形要素は別途 50% を維持 */
    --shadow-card: none;              /* 例: 0 .75rem 2rem rgba(0,0,0,.08) */
    --slide-pad-top: clamp(2.5rem, 6vh, 4.875rem);
    --slide-pad-inline: clamp(3.75rem, 7vw, 7.5rem);
    --slide-pad-bottom: clamp(2.5rem, 6vh, 4.5rem);
    --stage-gap: clamp(1.375rem, 3.4vh, 2.375rem);
    --stage-gap-center: clamp(1.625rem, 4vh, 2.75rem);
    --grid-gap: 1.5rem;
    --grid-gap-tight: 1.25rem;
    --grid-gap-compact: 1.375rem;
    --grid-gap-wide: 1.625rem;
    --grid-gap-roomy: 1.75rem;
    --item-gap: 0.875rem;

    /* 閲覧画面の縦横比にかかわらず、16:9全体を画面内へ収める。 */
    --screen-slide-width: min(100vw, calc(100vh * 16 / 9));
    --screen-slide-height: min(100vh, calc(100vw * 9 / 16));
  }
  /* 比率スケールの基準：1rem＝表示中スライド幅の1%。
     横長・縦長・Windows表示倍率を問わず、幅と高さの厳しい側に合わせて縮小する。 */
  html {
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    font-size: clamp(7px, min(1vw, calc(1vh * 16 / 9)), 28px);
  }
  html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue",
                 "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    background: #eef0f3;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* 改行制御：見出し＝balance（行の長さを揃える）／本文＝pretty（中途半端な早折りをしない） */
  h1, h2, h3, h4, .bigstmt, .keyline, .quote {
    word-break: auto-phrase; text-wrap: balance; overflow-wrap: break-word;
  }
  p, li, .substmt, .why, .take, .hsub, .lead, .keylead, .kpi .l, .cap, .ct {
    word-break: auto-phrase; text-wrap: pretty; overflow-wrap: break-word;
  }
  .slide {
    width: var(--screen-slide-width); height: var(--screen-slide-height);
    margin: calc((100vh - var(--screen-slide-height)) / 2)
            calc((100vw - var(--screen-slide-width)) / 2);
    background: #fff;
    position: relative;
    padding: var(--slide-pad-top) var(--slide-pad-inline) var(--slide-pad-bottom);
    display: flex; flex-direction: column;
    scroll-snap-align: start;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }
  .slide::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--bg-image) center / cover no-repeat;
    z-index: 0;
  }
  .slide:not(.cover)::before {
    filter: blur(0.3125rem);
    transform: scale(1.014);
    opacity: .5;
  }
  .slide > * { position: relative; z-index: 1; }

  /* 会社ロゴ（左下・各スライドに1つ埋め込み）。テーマの --logo で切替（none ならロゴなし） */
  .corp-logo { position: absolute; left: clamp(3.75rem, 7vw, 7.5rem); bottom: clamp(1.25rem, 3vh, 1.875rem);
               width: 15rem; height: clamp(1.5rem, 3vh, 1.875rem); z-index: 2; pointer-events: none;
               background: var(--logo) left center / contain no-repeat; opacity: .92; }
  /* 左下までコンテンツが来るスライドはロゴを消す（例：P38を5段で使う時＝Step1がロゴと重なる。2026-07-15 依頼者確定） */
  .slide.nologo .corp-logo { display: none; }

  /* パターンタグ（実デッキでは削除する） */
  .pt { position: absolute; top: 1.25rem; right: 1.625rem; font-size: 1.125rem; color: var(--gray);
        font-weight: 600; letter-spacing: .08em; z-index: 2; }

  /* header */
  .head { padding-bottom: 1.25rem; border-bottom: 1px solid var(--line); }
  .head h1 { font-size: clamp(2.25rem, 3.9vw, 3.125rem); color: var(--ink); font-weight: 700;
             letter-spacing: -.015em; line-height: 1.18; }
  .head .hsub { font-size: clamp(1.25rem, 1.7vw, 1.4375rem); color: var(--gray); margin-top: 0.75rem; line-height: 1.5; }
  .head .kick { font-size: 1.25rem; color: var(--accent-ink); font-weight: 700; letter-spacing: .06em; margin-bottom: 0.625rem; }
  .page { position: absolute; right: clamp(3.75rem, 7vw, 7.5rem); bottom: clamp(1.25rem, 3vh, 1.875rem);
          font-size: 1.125rem; color: var(--gray); font-weight: 500; letter-spacing: .12em; }

  /* コンテンツ幅の上限：ワイド画面で要素が横長に間延びしないよう 90rem で止めて中央寄せ */
  .head, .stage { width: 100%; max-width: 90rem; margin-inline: auto; }

  /* centered content stage（padding-top はヘッダー下線との密着防止） */
  .stage { flex: 1; display: flex; flex-direction: column; justify-content: center;
           gap: var(--stage-gap); min-height: 0; padding-top: clamp(1.125rem, 3vh, 2.125rem); }
  .slide.center .stage { align-items: center; text-align: center; gap: var(--stage-gap-center); }

  /* generic panel */
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card); box-shadow: var(--shadow-card); padding: clamp(1.625rem, 3.4vh, 2.375rem) clamp(1.875rem, 3vw, 2.625rem); }
  .cols .panel.focus { background: #fff; border: 2px solid var(--accent); }
  /* 影はカード面だけに適用。既定値 none なのでneutralの見た目は変わらない。 */
  .kpi, .why, .take, .card, .loop .sx, .stepx, .mxrow, .sumrow, .dg .box,
  .tbl, .delta .d, .voice, .mtx .grid, .check, .plan, .stat, .drow, .cp,
  .mg .chart3, .ddc, .bub, .bac, .gg, .sumband, .sc, .pt3 {
    box-shadow: var(--shadow-card);
  }
  .panel h3 { font-size: clamp(1.5625rem, 2.3vw, 1.875rem); color: var(--ink); font-weight: 700; margin-bottom: 1.125rem; letter-spacing: -.01em; }
  .panel p, .panel li { font-size: clamp(1.25rem, 1.85vw, 1.4375rem); color: var(--ink2); line-height: 1.65; }
  .panel ul { padding-left: 1.5rem; }
  .panel li { margin-bottom: 0.75rem; }
  .panel li:last-child { margin-bottom: 0; }
  b, strong { color: var(--ink); font-weight: 600; }
  .muted { color: var(--gray); }

  /* big centered statement */
  .bigstmt { font-size: clamp(3rem, 5.8vw, 5.125rem); font-weight: 700; letter-spacing: -.025em;
             line-height: 1.16; color: var(--ink); }
  .bigstmt b { color: var(--ink); }
  .bigstmt .pink { color: var(--ink); background: linear-gradient(transparent 58%, var(--mark) 58%); padding: 0 .08em; }
  .substmt { font-size: clamp(1.4375rem, 2.5vw, 1.9375rem); color: var(--ink2); line-height: 1.7; max-width: 30ch; }
  .substmt b { color: var(--ink); }

  /* 反転スライド（メリハリ用）：章扉(P02)・主張(P03)・ヒーロー数字(P26)・締め(P33)などの
     「決め」の1枚に class="invert" を足すだけで全面濃色＋白文字になる。10枚に1〜2枚が目安（使いすぎない） */
  .slide.invert { background: var(--strong); }
  .slide.invert::before { display: none; }
  .invert h1, .invert .bigstmt, .invert .keyline, .invert .quote, .invert .heronum,
  .invert h1 b, .invert .bigstmt b, .invert .keyline b, .invert .quote b, .invert .substmt b { color: #fff; }
  .invert .substmt, .invert .keylead { color: rgba(255,255,255,.85); }
  .invert .bigstmt .pink, .invert .keyline .pink { color: #fff; background: linear-gradient(transparent 58%, rgba(255,255,255,.28) 58%); }
  .invert .chip.blue { background: #fff; color: var(--strong); }
  .invert .chnum { color: #fff; opacity: .1; }
  .invert .page, .invert .pt { color: rgba(255,255,255,.72); }
  .invert .herosrc { color: rgba(255,255,255,.6); }
  /* 反転面のロゴ：白抜き版（--logo-invert）を使い背景に馴染ませる（白い板は敷かない） */
  .invert .corp-logo { background-image: var(--logo-invert, none); opacity: .95; }

  /* キーメッセージ型（P06）：上段＝イラスト/画像×タイトル・説明の左右ブロック、下段＝キーメッセージ */
  .km { flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: center;
        gap: clamp(1.8rem, 3.4vh, 2.6rem); }
  .kmtop { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: clamp(2.4rem, 4vw, 4rem);
           align-items: stretch; max-width: 82rem; margin-inline: auto; width: 100%; }
  .kmfig { height: auto; min-height: clamp(20rem, 44vh, 26rem); display: flex; align-items: center; justify-content: center; }
  .kmfig img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .kmtx { display: flex; flex-direction: column; justify-content: center; }
  .kmtx h3 { font-size: 2.4rem; color: var(--ink); font-weight: 700; letter-spacing: -.01em;
             line-height: 1.35; margin-bottom: 1.1rem; }
  .kmtx p { font-size: 1.5rem; color: var(--ink2); line-height: 1.75; }
  .kmtx p b { color: var(--ink); }
 
  /* P06p 写真主導キーメッセージ：左実写＋右の主張/根拠/具体例＋下段の結論帯 */
  .slide.missionp { padding: 0; }
  .missionp .mp-photo { position: absolute; inset: 0 auto 0 0; width: 45%; overflow: hidden; z-index: 1;
                        clip-path: polygon(0 0, 100% 0, 86% 100%, 0 100%); }
  .missionp .mp-photo img { width: 100%; height: 100%; object-fit: cover; object-position: 45% center; display: block; }
  .missionp .mp-photo .ph { width: 100%; height: 100%; border-radius: 0; }
  .missionp .mp-right { position: absolute; left: 47%; right: 4.5%; top: 2.5rem; bottom: 14rem; z-index: 2;
                        display: flex; flex-direction: column; justify-content: center; min-height: 0; }
  .missionp .mp-right h1 { font-size: 3.45rem; line-height: 1.13; letter-spacing: -.025em; color: var(--ink);
                           font-weight: 800; text-wrap: balance; }
  .missionp .mp-right h1 strong { display: block; color: var(--strong); font-size: 1.08em; }
  .missionp .mp-source { margin-top: .75rem; font-size: 1.125rem; line-height: 1.45; color: var(--gray); }
  .missionp .mp-copy { margin-top: 1.35rem; padding: 1.15rem 1.35rem; border-left: .3rem solid var(--accent);
                       background: var(--panel); border-radius: 0 1rem 1rem 0; }
  .missionp .mp-copy h3 { font-size: 1.9rem; line-height: 1.3; color: var(--ink); font-weight: 800; margin-bottom: .7rem; }
  .missionp .mp-copy p { font-size: 1.25rem; line-height: 1.65; color: var(--ink2); max-width: 36em; }
  .missionp .mp-items { margin-top: 1.65rem; display: grid; grid-template-columns: repeat(4, 1fr); }
  .missionp .mp-item { min-width: 0; padding: 0 .65rem; text-align: center; border-left: 1px solid var(--line);
                       color: var(--strong); font-size: 1.05rem; font-weight: 700; }
  .missionp .mp-item:first-child { border-left: none; }
  .missionp .mp-item .ic { display: block; width: 2.5rem; height: 2.5rem; margin: 0 auto .45rem; color: var(--accent); }
  .missionp .mp-band { position: absolute; left: 7%; right: 4.5%; bottom: 3rem; min-height: 8.5rem; z-index: 4;
                       display: flex; align-items: center; justify-content: center; text-align: center;
                       padding: 1.4rem 3.2rem; color: #fff; background: linear-gradient(135deg, var(--strong), var(--accent-ink));
                       clip-path: polygon(2% 0, 100% 0, 98% 100%, 0 100%);
                       font-size: 2.05rem; line-height: 1.45; font-weight: 600; letter-spacing: .01em; }
  .missionp .mp-band > div { width: 100%; }
  .missionp .mp-band strong { color: #fff; font-size: 1.18em; font-weight: 800; border-bottom: .18rem solid var(--accent); }
  .missionp .corp-logo, .missionp .page { z-index: 5; }
  .missionp .corp-logo { left: 2rem; bottom: 1rem; width: 13rem; height: 2.4rem;
                                                      background-color: transparent; background-size: contain;
                                                      filter: drop-shadow(0 0 .18rem rgba(255,255,255,.95))
                                                              drop-shadow(0 0 .45rem rgba(255,255,255,.72)); }

  /* 章扉の透かし大数字（あしらい。不透明度は低く＝文字の邪魔をしない） */
  .chnum { position: absolute; right: 5rem; top: 50%; transform: translateY(-50%);
           font-size: 26rem; font-weight: 800; line-height: 1; letter-spacing: -.04em;
           color: var(--accent); opacity: .08; z-index: 1; pointer-events: none; }

  /* tint chips */
  .chip { display: inline-block; font-weight: 700; padding: 0.5rem 1.625rem; border-radius: var(--radius-pill); font-size: clamp(1.25rem,2vw,1.5rem); letter-spacing: .04em; }
  .chip.blue   { background: var(--accent);       color: #fff; }
  .chip.sakura { background: var(--accent2-soft); color: var(--accent2); border: 1px solid var(--line); }

  /* KPI band（タイルは横に伸ばさず、正方形寄りで中央にまとめる） */
  .kpis { display: flex; gap: var(--grid-gap); justify-content: center; max-width: 84rem; margin-inline: auto; width: 100%; }
  .kpi { flex: 1 1 0; max-width: 28rem; min-width: 0; min-height: clamp(22rem, 50vh, 28rem);
         background: var(--accent-soft); border: 1px solid var(--line); border-radius: var(--radius-card); padding: clamp(1.75rem,3.6vh,2.625rem) 1.75rem;
         text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 0.75rem; }
  .kpi .v { font-size: clamp(3.4rem, 6vw, 5.4rem); font-weight: 800; color: var(--ink); line-height: 1.0; letter-spacing: -.03em; }
  .kpi .v small { font-size: .42em; font-weight: 700; }
  .kpi .l { font-size: clamp(1.25rem, 1.8vw, 1.4375rem); color: var(--ink2); font-weight: 500; line-height: 1.5; }
  .kpi.pink { background: var(--accent2-soft); }
  .kpi.pink .v { color: var(--accent2); }
  .kpi.hero { background: var(--accent); border-color: var(--accent); }
  .kpi.hero .v { font-size: clamp(4.4rem, 7.6vw, 7rem); color: #fff; }
  .kpi.hero .l { color: rgba(255,255,255,.88); }

  /* two columns */
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: var(--grid-gap-wide); flex: 1; min-height: 0; align-items: stretch; }
  .cols .panel { display: flex; flex-direction: column; justify-content: center; }
  .cols .panel h3 { font-size: 2.2rem; }
  .cols .panel li { font-size: 1.4rem; line-height: 1.85; }
  .col .kick { font-size: 1.3125rem; color: var(--accent-ink); font-weight: 700; margin-bottom: 0.5rem; letter-spacing: .03em; }

  /* dark emphasis（単独バーは中身に幅を合わせる＝文字のない色面を作らない・行長も読める長さで折る） */
  .why { background: var(--strong); color: #f5f5f7; border-radius: var(--radius-card); padding: clamp(1.75rem,3.6vh,2.5rem) clamp(2rem,3vw,2.75rem);
         font-size: clamp(1.4375rem, 2.4vw, 1.875rem); line-height: 1.65; font-weight: 500;
         width: fit-content; max-width: min(100%, 42em); margin-inline: auto; }
  .why b { color: #fff; font-weight: 700; }
  .why .pink { color: #fff; font-weight: 700; border-bottom: 2px solid rgba(255,255,255,.45); }
  .why strong { color: #fff; font-weight: 700; }

  /* takeaway bars（単独バーは中身に幅を合わせる＝文字のない色面を作らない・行長も読める長さで折る） */
  .take { background: var(--accent-soft); border: 1px solid var(--line); border-radius: var(--radius-card); padding: clamp(1.625rem,3.2vh,2.25rem) clamp(2rem,3vw,2.75rem);
          font-size: clamp(1.375rem, 2.2vw, 1.6875rem); color: var(--ink2); line-height: 1.6; font-weight: 500;
          width: fit-content; max-width: min(100%, 42em); margin-inline: auto; }
  .take b { color: var(--ink); font-weight: 700; }
  .take.pink { background: var(--accent2-soft); }
  .take.pink b { color: var(--accent2); }

  /* cards（番号は白丸バッジで枠の上辺からはみ出させ、各カード中央に大きく置く）
     帯色 --c は既定＝アクセント色。**色分けは意味があるときだけ**（装飾目的で色を増やさない＝配色は3〜4色まで） */
  .cards { display: grid; gap: var(--grid-gap); padding-top: 2.1rem; }  /* はみ出す番号ぶんの逃げ */
  .cards.c3 { grid-template-columns: repeat(3,1fr); }
  .card { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card);
          padding: 3.1rem clamp(1.625rem,2.6vw,2.125rem) clamp(1.75rem,3.4vh,2.5rem); text-align: center;
          display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
  .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 0.3125rem;
                  background: var(--c, var(--accent)); border-radius: var(--radius-card) var(--radius-card) 0 0; }
  .card .src { position: absolute; top: -2.1rem; left: 50%; transform: translateX(-50%);
               width: 4.2rem; height: 4.2rem; border-radius: 50%; background: #fff;
               border: 0.19rem solid var(--c, var(--accent)); color: var(--c, var(--accent-ink));
               display: flex; align-items: center; justify-content: center;
               font-size: 1.8rem; font-weight: 800; z-index: 1; }
  .card h4 { font-size: clamp(1.4375rem, 2.2vw, 1.75rem); color: var(--ink); font-weight: 700; line-height: 1.3; }
  .card p { font-size: clamp(1.25rem, 1.85vw, 1.4375rem); color: var(--ink2); line-height: 1.55; }

  /* loop（循環ステップ 2x2）：中央の矢印で「順番」と「戻る」を可視化 */
  .loop { position: relative; display: grid; grid-template-columns: 1fr 1fr;
          gap: 4rem 4.5rem; max-width: 80rem; margin-inline: auto; width: 100%; flex: 1; min-height: 0; align-items: stretch; }
  .loop .sx { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card); padding: clamp(1.625rem,3.2vh,2.375rem) clamp(2rem,3vw,2.8rem);
              display: flex; align-items: center; gap: 1.6rem; }
  .loop .sx .n { flex: 0 0 auto; width: 4.2rem; height: 4.2rem; border-radius: 50%; background: var(--strong);
                 color: #fff; font-weight: 800; font-size: 1.75rem; display: flex; align-items: center; justify-content: center; }
  .loop .sx .tx h4 { font-size: clamp(1.6rem,2.3vw,1.95rem); color: var(--ink); font-weight: 700; margin-bottom: 0.25rem; }
  .loop .sx .tx p { font-size: clamp(1.25rem,1.9vw,1.45rem); color: var(--ink2); line-height: 1.5; }
  .loop .la { position: absolute; z-index: 2; color: var(--accent2); font-size: 2.7rem; font-weight: 350; line-height: 1; }
  .loop .la.r1 { left: 50%; top: 25%; transform: translate(-50%,-50%); }
  .loop .la.d  { left: 75%; top: 50%; transform: translate(-50%,-50%) rotate(90deg); }
  .loop .la.r2 { left: 50%; top: 75%; transform: translate(-50%,-50%) rotate(180deg); }
  .loop .la.u  { left: 25%; top: 50%; transform: translate(-50%,-50%) rotate(270deg); }

  /* flow（横3ステップ・変遷） */
  .flow { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--grid-gap-tight); align-items: stretch; flex: 1; min-height: 0; }
  .stepx { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card-medium); padding: clamp(1.375rem,2.8vh,2rem) clamp(1.5rem,2.4vw,2.2rem);
           display: flex; flex-direction: column; justify-content: center; }
  .stepx .n { font-size: 1.3rem; color: var(--accent-ink); font-weight: 800; letter-spacing: .08em; margin-bottom: 0.5rem; }
  .stepx h4 { font-size: clamp(1.7rem,2.5vw,2.15rem); color: var(--ink); font-weight: 800; line-height: 1.3; margin-bottom: 0.375rem; }
  .stepx p { font-size: clamp(1.25rem,1.9vw,1.45rem); color: var(--ink2); line-height: 1.5; }
  .stepx.on { background: var(--strong); border-color: var(--strong); }
  .stepx.on .n { color: rgba(255,255,255,.72); }
  .stepx.on h4 { color: #fff; }
  .stepx.on p { color: #e6e6e9; }

  /* maxims（指針カード：番号＋出典＋アクション。2つは縦積みでなく横並び＝正方形寄りのカードに） */
  .mx { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(1.25rem, 2.4vw, 1.875rem);
        max-width: 80rem; margin-inline: auto; width: 100%; }
  .mxrow { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card-compact);
           padding: clamp(2rem,4vh,2.6rem) clamp(2rem,3vw,2.6rem); display: flex; flex-direction: column; gap: 1.3rem;
           align-items: flex-start; min-height: clamp(24rem, 52vh, 29rem); }
  .mxrow .n { flex: 0 0 auto; width: 3.6rem; height: 3.6rem; border-radius: 50%; background: var(--strong);
              color: #fff; font-weight: 800; font-size: 1.4375rem; display: flex; align-items: center; justify-content: center; }
  .mxrow .b { flex: 1; display: flex; flex-direction: column; align-self: stretch; }
  .mxrow .b h3 { font-size: clamp(1.7rem, 2.4vw, 2.05rem); color: var(--ink); font-weight: 700; line-height: 1.3; margin-bottom: 0.375rem; letter-spacing: -.01em; }
  .mxrow .b h3 .pink { background: linear-gradient(transparent 58%, var(--mark) 58%); padding: 0 .06em; }
  .mxrow .b .src { margin-top: .4rem; font-size: clamp(1.2rem, 1.7vw, 1.35rem); color: var(--ink2); line-height: 1.55; }
  .mxrow .b .src b { color: var(--ink); font-weight: 700; }
  .mxrow .b .act { margin-top: auto; align-self: flex-start; font-size: clamp(1.125rem,1.7vw,1.25rem); color: #fff; background: var(--strong);
                   border-radius: var(--radius-small); padding: 0.5rem 1rem; display: inline-block; font-weight: 600; }
  .mx.three { grid-template-columns: repeat(3, 1fr); max-width: 86rem; }
  .mx.three .mxrow { padding: 2.2rem 2rem; gap: 1.1rem; }
  .mx.three .mxrow .n { width: 3.2rem; height: 3.2rem; font-size: 1.4rem; }
  .mx.three .mxrow .b h3 { font-size: 1.65rem; }
  .mx.three .mxrow .b .src, .mx.three .mxrow .b .act { font-size: 1.15rem; }

  /* summary grid（まとめ一覧） */
  .sum { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem; }
  .sumrow { display: flex; align-items: center; gap: 1.3rem; background: var(--accent-soft); border: 1px solid var(--line);
            border-radius: var(--radius-card-compact); padding: 2rem 1.9rem; }
  .sumrow .n { flex: 0 0 auto; width: 3.3rem; height: 3.3rem; border-radius: 50%; background: var(--strong); color: #fff;
               font-weight: 800; font-size: 1.375rem; display: flex; align-items: center; justify-content: center; }
  .sumrow .t { font-size: 1.45rem; color: var(--ink2); line-height: 1.4; font-weight: 600; }
  .sumrow .t b { color: var(--ink); }
  .sumrow.wide { grid-column: 1 / -1; background: var(--strong); border-color: var(--strong); }
  .sumrow.wide .n { background: #fff; color: var(--strong); }
  .sumrow.wide .t { color: #f5f5f7; }
  .sumrow.wide .t b { color: #fff; }

  /* quote（引用。発言・出典とも中央寄せ） */
  .quote { font-size: clamp(1.625rem, 2.8vw, 2.375rem); color: var(--ink); font-weight: 700; line-height: 1.5; letter-spacing: -.01em;
           text-align: center; max-width: min(100%, 30em); margin-inline: auto; }
  .quote::before { content: "“"; color: var(--gray); font-weight: 900; margin-right: .04em; }
  .quote::after  { content: "”"; color: var(--gray); font-weight: 900; margin-left: .04em; }
  .qby { font-size: clamp(1.125rem,1.6vw,1.25rem); color: var(--gray); font-weight: 600; margin-top: 0.875rem; letter-spacing: .04em;
         text-align: center; }

  /* figure（画像） */
  .fig { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 0.875rem; }
  /* 写真＝cover で枠いっぱい（枠線・白帯を残さない）が既定。スクショ・図表は .fig.fit で contain＋枠 */
  .fig .body { flex: 1; min-height: 0; border-radius: var(--radius-card); overflow: hidden; }
  .fig .body img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .fig.fit .body { border: 1px solid var(--line); background: #fff; }
  .fig.fit .body img { object-fit: contain; }
  .fig .cap { font-size: 1.1875rem; color: var(--gray); text-align: center; line-height: 1.5; }
  /* マップ図版は本文領域の上端から全高を使う。
     通常の .stage の上下中央寄せを継承すると、図の上に大きな空白が生まれる。 */
  .slide.map-figure-slide .stage { justify-content: flex-start; padding-top: 1.125rem; }
  .slide.map-figure-slide .fig { width: 100%; height: 100%; flex: 1 1 auto; }
  .slide.map-figure-slide .fig .body { width: 100%; height: 100%; }
  .figs2 { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; gap: var(--grid-gap-wide); }
  .figs2 .fig { flex: none; height: 100%; }
  /* 画像プレースホルダ（実デッキでは <img src="assets/…"> に置換） */
  .ph { width: 100%; height: 100%; min-height: 15rem; border: 2px dashed #c9c9ce; border-radius: var(--radius-card);
        background: var(--panel); display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 0.75rem; color: var(--gray); font-size: 1.25rem; font-weight: 600; }
  .ph .ib { width: 2em; height: 2em; margin: 0; color: #b9b9bf; }

  /* chart（グラフ） */
  .chart { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 0.625rem; }
  .chart .ct { font-size: 1.25rem; color: var(--ink2); font-weight: 600; }
  .chart .ct .muted { font-weight: 500; }
  .chart svg { width: 100%; height: 100%; min-height: 0; flex: 1; }

  /* keyphrase＋画像（フレーズが主役、画像は下で支える） */
  .keyline { font-size: clamp(2.125rem, 3.6vw, 3.375rem); font-weight: 700; letter-spacing: -.02em;
             line-height: 1.3; color: var(--ink); text-align: center; }
  .keyline .pink { background: linear-gradient(transparent 58%, var(--mark) 58%); padding: 0 .06em; }
  .keylead { font-size: clamp(1.25rem, 1.9vw, 1.5rem); color: var(--ink2); line-height: 1.7;
             text-align: center; max-width: 42em; margin-inline: auto; }
  .keylead b { color: var(--ink); }
  /* 画像の並び：.fig を1〜3個入れるだけで自動レイアウト（1枚＝大きく中央／2〜3枚＝横並び） */
  .figs { flex: 0 0 auto; height: clamp(17.5rem, 42vh, 28.75rem); display: flex; gap: 1.625rem;
          justify-content: center; max-width: 81.25rem; margin-inline: auto; width: 100%; }
  .figs .fig { flex: 0 1 38.75rem; height: 100%; min-width: 0; }
  .figs .fig:only-child { flex-basis: 57.5rem; }

  /* 全面背景画像＋ワンフレーズ（表紙型。背景は .slide の style で差し替え） */
  .slide.bgphoto::before { display: none; }   /* 地紋を消して写真を全面に */
  .bgphoto .bigstmt, .bgphoto .keyline { color: #fff; }
  .bgphoto .substmt { color: rgba(255,255,255,.88); }
  .bgphoto .substmt b { color: #fff; }
  .bgphoto .pt { color: rgba(255,255,255,.75); }
  .bgphoto .page { color: rgba(255,255,255,.75); }

  /* pie（円グラフ＝ドーナツ。主役1切れだけインク、残りはグレー階調・4切れまで） */
  .pie { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center;
         gap: clamp(2.75rem, 6vw, 6rem); }
  .pie svg { height: clamp(18.75rem, 46vh, 28.75rem); width: auto; }
  .plg { display: flex; flex-direction: column; gap: clamp(0.875rem, 2.2vh, 1.375rem); }
  .plg .li { display: flex; align-items: center; gap: 0.875rem; font-size: clamp(1.1875rem, 1.8vw, 1.4375rem); color: var(--ink2); }
  .plg .sw { flex: none; width: 1.125rem; height: 1.125rem; border-radius: 0.3125rem; }
  .plg .li b { color: var(--ink); margin-left: 0.375rem; }

  /* diagram（図解：構造） */
  .dg { display: flex; flex-direction: column; align-items: center; gap: 0.375rem; }
  .dg .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; width: 100%; }
  .dg .box { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card-compact); text-align: center;
             padding: clamp(1.125rem,2.4vh,1.625rem) 1.25rem; }
  .dg .box h4 { font-size: clamp(1.3125rem,1.9vw,1.5625rem); color: var(--ink); font-weight: 700; margin-bottom: 0.25rem; }
  .dg .box p { font-size: clamp(1.125rem,1.6vw,1.25rem); color: var(--ink2); line-height: 1.45; }
  .dg .box.top { background: var(--strong); border-color: var(--strong); width: min(35rem, 60%); }
  .dg .box.top h4 { color: #fff; }
  .dg .box.top p { color: #e6e6e9; }
  .dg .box.base { width: 100%; background: var(--accent-soft); }
  .dg .arr { font-size: 1.375rem; color: #b9b9bf; line-height: 1; padding: 2px 0; }

  /* icons (inline SVG sprite) — 文字と同じ行・同等サイズの控えめな線画 */
  .ic { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2;
        stroke-linecap: round; stroke-linejoin: round; display: block; }
  .ib { display: inline-block; width: 1.08em; height: 1.08em; flex: none;
        color: var(--accent-ink); vertical-align: -0.14em; margin-right: .38em; }
  .take.pink .ib { color: var(--accent2); }
  .card h4 .ib { color: var(--c, var(--accent-ink)); }
  .chip .ic { stroke-width: 2.4; }
  .chip .ib { color: inherit; width: 1.05em; height: 1.05em; margin-right: .35em; }

  /* table（比較表。自社＝右列を強調）。
     ラベル列は細く・本文列を広く：ラベルは短い体言止めなので幅を絞り、本文の折返しを減らして
     行高を揃える（旧1.15frはラベルが本文より広く、本文2行折返しで行高が乱れた。2026-07-15 依頼者指摘） */
  .tbl { display: grid; grid-template-columns: minmax(10rem, .55fr) 1fr 1fr; max-width: 75rem; margin-inline: auto; width: 100%;
         border: 1px solid var(--line); border-radius: var(--radius-card-medium); overflow: hidden; background: #fff; }
  .tbl .c { padding: clamp(1rem,2.4vh,1.5rem) clamp(1.125rem,2vw,1.75rem); font-size: clamp(1.125rem,1.7vw,1.375rem);
            color: var(--ink2); border-top: 1px solid var(--line); display: flex; align-items: center;
            justify-content: center; text-align: center; line-height: 1.45; }
  .tbl .c.l { justify-content: flex-start; text-align: left; font-weight: 600; color: var(--ink); }
  .tbl .c.h { background: var(--panel); font-weight: 700; color: var(--ink); border-top: none; }
  .tbl .c.h.me { background: var(--strong); color: #fff; }
  .tbl .c.me { background: var(--accent-soft); font-weight: 700; color: var(--ink); }
  .tbl .mk { font-size: 1.25em; font-weight: 800; }

  /* timeline（ロードマップ。現在地だけアクセント色） */
  .tl { position: relative; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.125rem;
        max-width: 80rem; margin-inline: auto; width: 100%; }
  .tl::before { content: ""; position: absolute; left: 11%; right: 11%; top: 0.625rem; height: 0.1875rem;
                border-radius: 2px; background: var(--line); }
  .ti { text-align: center; position: relative; }
  .ti .dot { width: 1.375rem; height: 1.375rem; border-radius: 50%; background: #fff; border: 0.25rem solid var(--bar);
             margin: 0 auto 1rem; position: relative; }
  .ti.on .dot { border-color: var(--accent); background: var(--accent); }
  .ti .w { font-size: 1.125rem; color: var(--gray); font-weight: 700; letter-spacing: .06em; margin-bottom: 0.375rem; }
  .ti h4 { font-size: clamp(1.25rem,1.9vw,1.5625rem); color: var(--ink); font-weight: 700; margin-bottom: 0.375rem; }
  .ti.on h4 { color: var(--accent-ink); }
  .ti p { font-size: clamp(1.125rem,1.6vw,1.25rem); color: var(--ink2); line-height: 1.5; }

  /* duo（左右分割：テキスト×画像） */
  .duo { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1.15fr;
         gap: clamp(2.25rem, 4vw, 4rem); align-items: center; }
  .duo .tx h3 { font-size: 2.6rem; color: var(--ink); font-weight: 700; margin-bottom: 1.6rem; letter-spacing: -.015em; line-height: 1.25; }
  .duo .tx ul { padding-left: 1.5rem; }
  .duo .tx li { font-size: 1.5rem; color: var(--ink2); line-height: 1.7; margin-bottom: 1rem; }
  .duo .fig { height: clamp(18.75rem, 48vh, 32.5rem); flex: none; }

  /* delta（変化の矢印：Before→After） */
  .delta { display: flex; align-items: center; justify-content: center; gap: clamp(1.5rem, 3vw, 3rem); }
  .delta .d { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card-large);
              padding: 3.4rem 4.5rem; text-align: center; min-width: 25rem; }
  .delta .d .v { font-size: 6.4rem; font-weight: 800; color: var(--ink); line-height: 1.05; letter-spacing: -.03em; }
  .delta .d .v small { font-size: .42em; font-weight: 700; }
  .delta .d .l { font-size: 1.4rem; color: var(--ink2); margin-top: 0.9rem; }
  .delta .d.after { background: var(--accent); border-color: var(--accent); }
  .delta .d.after .v { color: #fff; }
  .delta .d.after .l { color: rgba(255,255,255,.88); }
  .delta .arr { font-size: 5rem; color: var(--accent-ink); font-weight: 800; line-height: 1; }

  /* heronum（ヒーロー数字1つ） */
  .heronum { font-size: clamp(7.5rem, 16vw, 15rem); font-weight: 800; color: var(--accent);
             letter-spacing: -.04em; line-height: 1; }
  .heronum small { font-size: .32em; font-weight: 800; }
  .herosrc { font-size: 1.125rem; color: var(--gray); letter-spacing: .06em; }

  /* voices（主役1件＋補助2件）：引用の強さと出典の確かさを視覚化 */
  .voices { display: grid; grid-template-columns: 1.35fr 1fr 1fr; gap: var(--grid-gap);
            max-width: 81.25rem; margin-inline: auto; width: 100%; }
  .voice { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card);
           padding: clamp(1.625rem,3.2vh,2.25rem) clamp(1.625rem,2.4vw,2rem); display: flex; flex-direction: column; gap: 1rem; }
  .voice .q { font-size: clamp(1.1875rem, 1.8vw, 1.4375rem); color: var(--ink); font-weight: 600; line-height: 1.65; }
  .voice .q::before { content: "“"; color: var(--accent); font-weight: 900; margin-right: .04em; }
  .voice .q::after  { content: "”"; color: var(--accent); font-weight: 900; margin-left: .04em; }
  .voice .who { font-size: 1.125rem; color: var(--gray); margin-top: auto; }
  .voice.main { background: var(--strong); border-color: var(--strong); padding: 2.4rem; }
  .voice.main .q { color: #fff; font-size: 1.65rem; }
  .voice.main .q::before, .voice.main .q::after { color: color-mix(in srgb,var(--accent) 25%,#fff); }
  .voice.main .who { color: rgba(255,255,255,.76); }
  .voice .profile { display: flex; align-items: center; gap: .8rem; margin-top: auto; }
  .voice .avatar { width: 2.8rem; height: 2.8rem; border-radius: 50%; background: var(--accent-soft);
                   border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; color: var(--accent-ink); flex: none; }
  .voice.main .avatar { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.25); color: #fff; }
  .voice .avatar .ic { width: 1.35rem; height: 1.35rem; }

  /* matrix（2軸4象限） */
  .mtx { width: min(58rem, 100%); margin-inline: auto; padding-left: 3.5rem; padding-bottom: 2.8rem; position: relative; }
  .mtx .ax { font-size: 1.125rem; color: var(--gray); font-weight: 700; letter-spacing: .04em; }
  .mtx .ax.y { position: absolute; left: 0; top: 50%; transform: translate(-35%,-50%) rotate(-90deg); white-space: nowrap; }
  .mtx .ax.x { position: absolute; right: 0; bottom: 0; white-space: nowrap; }
  .mtx .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
               height: clamp(18.75rem, 44vh, 27.5rem); border: 1px solid var(--line); border-radius: var(--radius-card-medium);
               overflow: hidden; background: #fff; }
  .mtx .qd { padding: clamp(1rem,2.2vh,1.5rem) clamp(1.125rem,2vw,1.625rem); border: 1px solid var(--line);
             font-size: clamp(1.125rem, 1.7vw, 1.3125rem); color: var(--ink2); line-height: 1.5; }
  .mtx .qd b { display: block; color: var(--ink); font-size: 1.05em; margin-bottom: 0.375rem; }
  .mtx .qd.hot { background: color-mix(in srgb,var(--accent) 16%,#fff); border: 1.5px solid var(--accent2); }
  .mtx .qd.hot b { color: var(--accent-ink); }
  .mtx .grid::before, .mtx .grid::after { content: ""; position: absolute; z-index: 3; pointer-events: none; }
  .mtx .grid { position: relative; overflow: visible; }
  .mtx .grid::before { left: 50%; top: 0; bottom: 0; border-left: 2px solid var(--strong); }
  .mtx .grid::after { top: 50%; left: 0; right: 0; border-top: 2px solid var(--strong); }
  .mtx .qd { position: relative; z-index: 1; background: #fff; }

  /* people（2〜4人の人物紹介）：淡い台紙から縦長ポートレートが立ち上がる型。
     写真は縦長（切り抜きPNGだと頭が台紙の上に抜けて見栄え◎）。.person の数で自動サイズ */
  .people { display: flex; justify-content: center; gap: clamp(3rem, 6vw, 7.5rem);
            max-width: 86rem; margin-inline: auto; width: 100%; }
  .person { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .person .shot { position: relative; width: 21rem; height: 26rem; margin-bottom: 1.7rem; }
  .person .shot::before { content: ""; position: absolute; left: 0; right: 0; top: 2.8rem; bottom: 0;
                          background: var(--accent-soft); }
  .person .shot img, .person .shot .ph2 {
      position: absolute; left: 50%; transform: translateX(-50%); bottom: 0;
      width: 76%; height: 100%; object-fit: cover; object-position: top center; }
  .person .ph2 { background: linear-gradient(180deg, #e9ebec, #d3d6d8); display: flex; flex-direction: column;
                 align-items: center; justify-content: center; gap: 0.7rem; color: var(--gray); font-size: 0.95rem; }
  .person .ph2 .ib { width: 2.4em; height: 2.4em; margin: 0; color: #b0b3b6; }
  .person .ttl { font-size: 1rem; color: var(--gray); letter-spacing: .08em; }
  .person .nm { font-size: 1.75rem; font-weight: 700; color: var(--ink); letter-spacing: .16em; margin-top: 0.4rem; }
  .person .en { font-size: 0.95rem; color: var(--gray); letter-spacing: .16em; margin-top: 0.35rem; }
  .person .scope { margin-top: .8rem; padding-top: .65rem; border-top: 1px solid var(--line); width: 100%;
                   font-size: 1rem; color: var(--ink2); line-height: 1.45; }
  .people:has(.person:nth-child(3)) .shot { width: 17rem; height: 22rem; }
  .people:has(.person:nth-child(4)) .shot { width: 14.5rem; height: 19rem; }
  .people:has(.person:nth-child(4)) .nm { font-size: 1.5rem; }

  /* solo（1人の人物紹介）：写真は画面全体に敷き、左側は白へグラデーションで溶かす（テキストはその上）。
     下辺は左上がりの斜めカット。写真は「人物が右にいる構図」を使う */
  .solo-photo { position: absolute; inset: 0; z-index: 0;
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 72%); overflow: hidden; }
  .solo-photo img, .solo-photo .ph2 { width: 100%; height: 100%; object-fit: cover; object-position: right center; display: block; }
  /* 左→白のグラデーション（文字の可読性はこれで担保） */
  .solo-photo::after { content: ""; position: absolute; inset: 0;
                       background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,.92) 36%, rgba(255,255,255,0) 64%); }
  .solo-photo .ph2 { background: linear-gradient(200deg, #eceeef, #cfd3d6); display: flex; flex-direction: column;
                     align-items: center; justify-content: center; gap: 0.8rem; padding-left: 56%;
                     color: var(--gray); font-size: 1.05rem; }
  .solo-photo .ph2 .ib { width: 3em; height: 3em; margin: 0; color: #adb1b5; }
  /* 全面写真がある1人スライドは、見出しの下線を消して左に収める */
  .slide:has(.solo-photo) .head { border-bottom: none; }
  .slide:has(.solo-photo) .head h1, .slide:has(.solo-photo) .head .hsub { max-width: 53%; }
  .solo { max-width: 52%; display: flex; flex-direction: column; justify-content: center;
          align-items: flex-start; gap: 1.2rem; }
  /* バーはグラデーション（--accent2→--accent）。文の長さで段々に・1行固定 */
  .solo .bar { width: fit-content; white-space: nowrap; color: #fff;
               background: linear-gradient(90deg, var(--accent2), var(--accent));
               font-size: 1.75rem; font-weight: 700; line-height: 1.45;
               padding: 0.95rem 2.4rem;
               border-radius: 0.25rem; }
  .solo .who { margin-top: 2.2rem; }
  .solo .ttl { font-size: 1.05rem; color: var(--gray); letter-spacing: .08em; }
  .solo .nm { font-size: 2.4rem; font-weight: 800; color: var(--ink); letter-spacing: .14em; margin-top: 0.35rem; }
  .solo .en { font-size: 1rem; color: var(--gray); letter-spacing: .22em; margin-top: 0.35rem; }

  /* checks（チェックリスト） */
  .checks { display: flex; flex-direction: column; gap: var(--item-gap); max-width: 57.5rem; margin-inline: auto; width: 100%; }
  .check { display: flex; gap: 0.875rem; align-items: flex-start; background: var(--panel);
           border: 1px solid var(--line); border-radius: var(--radius-card-soft); padding: clamp(1rem,2.2vh,1.375rem) clamp(1.25rem,2vw,1.75rem);
           font-size: clamp(1.1875rem, 1.8vw, 1.4375rem); color: var(--ink2); line-height: 1.55; }
  .check .ib { color: var(--accent-ink); margin-top: .18em; }
  .check b { color: var(--ink); }

  /* plans（プランカード：推しを強調） */
  .plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--grid-gap);
           max-width: 77.5rem; margin-inline: auto; width: 100%; align-items: stretch; }
  .plan { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-card);
          padding: clamp(1.625rem,3.2vh,2.25rem) clamp(1.5rem,2.2vw,1.875rem); display: flex; flex-direction: column; gap: 0.75rem; text-align: center; }
  .plan.reco { border: 2px solid var(--accent); position: relative; }
  .plan.reco::before { content: "おすすめ"; position: absolute; top: -1.0625rem; left: 50%; transform: translateX(-50%);
                       background: var(--accent); color: #fff; border-radius: var(--radius-pill); padding: 0.25rem 1.25rem;
                       font-size: 1.125rem; font-weight: 700; letter-spacing: .04em; }
  .plan h4 { font-size: clamp(1.25rem, 1.9vw, 1.5rem); color: var(--ink); font-weight: 700; }
  .plan .price { font-size: clamp(2.25rem, 3.6vw, 3.25rem); font-weight: 800; color: var(--ink); letter-spacing: -.02em; }
  .plan .price small { font-size: .4em; font-weight: 700; color: var(--ink2); }
  .plan ul { text-align: left; padding-left: 1.375rem; margin-top: 0.25rem; }
  .plan li { font-size: clamp(1.125rem, 1.6vw, 1.25rem); color: var(--ink2); line-height: 1.55; margin-bottom: 0.5rem; }


  /* ===== P34〜P47（2026-07-14 参考スライド14枚から採り込んだ型） ===== */
  /* 構造要素としてのアイコン丸（行頭・カード頭）。本文中のバッジ利用は引き続き禁止 */
  .icb { width: 3.6rem; height: 3.6rem; border-radius: 50%; background: var(--accent); color: #fff;
         display: flex; align-items: center; justify-content: center; flex: none; }
  .icb .ic { width: 1.8rem; height: 1.8rem; }
  .icb.deep { background: var(--strong); }

  /* P34 目次：左に大タイトル・右に番号リスト */
  .toc { flex: 1; display: grid; grid-template-columns: 1fr 1.25fr; align-items: center;
         gap: clamp(3rem, 6vw, 6rem); max-width: 78rem; margin-inline: auto; width: 100%; }
  .toc .tt { font-size: 3rem; font-weight: 800; color: var(--ink); letter-spacing: -.02em; white-space: nowrap; }
  .toc .ls { display: flex; flex-direction: column; gap: 1.65rem; }
  .toc .it { display: flex; align-items: center; gap: 1.3rem; font-size: 1.65rem; font-weight: 600; color: var(--ink); }
  .toc .it .n { width: 2.75rem; height: 2.75rem; border-radius: 50%; background: var(--strong); color: #fff;
                font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex: none; }

  /* P35 統計カード：アイコン丸＋ラベル＋大数字＋補足 */
  .stats { display: flex; gap: var(--grid-gap); justify-content: center; max-width: 84rem; margin-inline: auto; width: 100%; }
  .stat { flex: 1 1 0; max-width: 27rem; background: #fff; border: 1px solid var(--line); border-radius: var(--radius-card-soft);
          padding: 2.1rem 1.7rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: .85rem; }
  .stat .lb { font-size: 1.3rem; font-weight: 700; color: var(--ink); }
  .stat .num { font-size: 3.4rem; font-weight: 800; color: var(--strong); line-height: 1; letter-spacing: -.02em; }
  .stat .num small { font-size: .45em; font-weight: 700; }
  .stat .ds { font-size: 1.15rem; color: var(--ink2); line-height: 1.55; }

  /* P36 循環図解：左リスト×右リング図。
     コンテナ幅とgapを詰めて中央の空洞を防ぐ（旧84rem+広gapは列間が空きすぎた。2026-07-15 依頼者指摘） */
  .cyc { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1.05fr; align-items: center;
         gap: clamp(1.5rem, 2.5vw, 2.75rem); max-width: 74rem; margin-inline: auto; width: 100%; }
  .cyc .spec { padding: 1.35rem 0; border-bottom: 1px solid var(--line); }
  .cyc .spec:last-child { border-bottom: none; }
  .cyc .spec h4 { font-size: 1.5rem; font-weight: 700; color: var(--accent-ink); margin-bottom: .45rem; }
  .cyc .spec h4::before { content: "●"; color: var(--accent); font-size: .7em; margin-right: .6em; vertical-align: .15em; }
  .cyc .spec p { font-size: 1.2rem; color: var(--ink2); line-height: 1.6; }
  .cyc svg { width: 100%; height: auto; max-height: 52vh; }

  /* P37 詳細リスト：アイコン行の高密度リスト */
  .drows { display: flex; flex-direction: column; gap: 1rem; max-width: 86rem; margin-inline: auto; width: 100%; }
  .drow { display: flex; align-items: center; gap: var(--grid-gap); background: var(--panel); border-radius: .8rem;
          padding: 1.15rem 1.7rem; }
  .drow .rt { flex: 0 0 13.5rem; font-weight: 700; font-size: 1.3rem; color: var(--ink); text-align: center;
              text-wrap: balance; overflow-wrap: break-word; }
  .drow .dv { width: 1px; align-self: stretch; background: var(--line); flex: none; }
  .drow p { font-size: 1.15rem; color: var(--ink2); line-height: 1.62; }

  /* P38 階段ステップ：右肩上がりの矢羽。
     flex:1にしない＝内容高さのブロックにして .stage の justify-content:center で上下中央に置く
     （旧仕様は全高に広がり下端に張り付いた。2026-07-15 依頼者指摘で修正） */
  .stair { display: flex; align-items: flex-end; justify-content: center;
           gap: .9rem; max-width: 88rem; margin-inline: auto; width: 100%; }
  .stp { flex: 1 1 0; display: flex; flex-direction: column; align-items: center; gap: .7rem; }
  .stp .icw { width: 6.2rem; height: 6.2rem; border-radius: 50%; border: 2px dashed var(--bar);
              display: flex; align-items: center; justify-content: center; color: var(--accent-ink); }
  .stp .icw .ic { width: 2.7rem; height: 2.7rem; }
  .stp .bar { width: 100%; color: #fff; font-weight: 700; text-align: center; font-size: 1.3rem;
              padding: .85rem 1.1rem .85rem .6rem; clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%); }
  .stp p { font-size: 1.15rem; color: var(--ink2); line-height: 1.6; text-align: left; width: 100%; }

  /* P39 チャート2枚比較（縦ラベル付きパネル） */
  .cp2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--grid-gap-roomy); max-width: 84rem; margin-inline: auto; width: 100%; }
  .cp { display: flex; gap: 1.1rem; align-items: center; border: 1px solid var(--line); border-radius: var(--radius-card-flat);
        padding: 1.4rem 1.5rem; background: #fff; }
  .cp .vlab { writing-mode: vertical-rl; font-size: 1.05rem; color: var(--ink2); font-weight: 700;
              border-left: 2px solid var(--accent); padding-left: .5rem; flex: none; }
  .cp .body { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: .9rem; justify-content: flex-start; }
  .cp .body .d-source { margin-top: auto; align-self: flex-end; }
  .cp svg { width: 15rem; height: 15rem; flex: none; }

  /* P40 メッセージ×グラフ */
  .mg { flex: 1; min-height: 0; display: grid; grid-template-columns: .85fr 1.15fr; align-items: center;
        gap: clamp(2.5rem, 4vw, 4.5rem); max-width: 86rem; margin-inline: auto; width: 100%; }
  .mg .lead3 { font-size: 2.1rem; font-weight: 800; color: var(--ink); line-height: 1.4; margin-bottom: 1.3rem; }
  .mg .body3 { font-size: 1.25rem; color: var(--ink2); line-height: 1.8; }
  .mg .src3 { font-size: 1rem; color: var(--gray); margin-top: 1.6rem; line-height: 1.5; }
  .mg .chart3 { position: relative; border: 1px solid var(--line); border-radius: var(--radius-card-flat); background: #fff;
                padding: 1.6rem 1.6rem 1.2rem; }
  .mg .chart3 .ct { text-align: center; margin-bottom: .6rem; }
  .mg .co { position: absolute; top: 2.6rem; left: 2rem; width: 7.6rem; height: 7.6rem; border-radius: 50%;
            background: var(--strong); color: #fff; display: flex; flex-direction: column; align-items: center;
            justify-content: center; line-height: 1.25; font-weight: 700; font-size: 1rem; text-align: center; }
  .mg .co b { font-size: 1.55rem; color: #fff; }

  /* P41 DO/DON'T */
  .dd { display: grid; grid-template-columns: 1fr 1fr; gap: var(--grid-gap-roomy); max-width: 84rem; margin-inline: auto; width: 100%; }
  .ddc { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-card-soft); overflow: hidden; }
  .ddc .hd2 { padding: .95rem; text-align: center; color: #fff; font-weight: 800; font-size: 1.3rem; }
  .ddc.do .hd2 { background: var(--accent); }
  .ddc.dont .hd2 { background: var(--accent2); }
  .ddi { display: flex; gap: 1.1rem; align-items: flex-start; padding: 1.15rem 1.5rem;
         border-bottom: 1px solid var(--line); font-size: 1.2rem; color: var(--ink2); line-height: 1.6; }
  .ddi:last-child { border-bottom: none; }
  .ddi .mk2 { flex: none; width: 1.7rem; height: 1.7rem; border-radius: 50%; display: flex; align-items: center;
              justify-content: center; color: #fff; margin-top: .15rem; }
  .ddc.do .mk2 { background: var(--accent); }
  .ddc.dont .mk2 { background: var(--accent2); }
  .ddi .mk2 .ic { width: .95rem; height: .95rem; stroke-width: 3; }

  /* P42 イラスト×吹き出し */
  .qa { flex: 1; min-height: 0; display: grid; grid-template-columns: .8fr 1.2fr; align-items: center;
        gap: clamp(2.5rem, 4vw, 4rem); max-width: 84rem; margin-inline: auto; width: 100%; }
  .bubs { display: flex; flex-direction: column; gap: 1.9rem; }
  .bub { position: relative; border: 1px solid var(--accent2); border-radius: var(--radius-card-flat); background: #fff;
         padding: 1.9rem 1.6rem 1.25rem; }
  .bub::before { content: ""; position: absolute; left: -.62rem; top: 1.9rem; width: 1.1rem; height: 1.1rem;
                 background: #fff; border-left: 1px solid var(--accent2); border-bottom: 1px solid var(--accent2);
                 transform: rotate(45deg); }
  .bub .tag { position: absolute; top: -1.05rem; left: 1.3rem; background: var(--strong); color: #fff;
              padding: .35rem 1.3rem; border-radius: .4rem; font-weight: 700; font-size: 1.1rem; }
  .bub p { font-size: 1.15rem; color: var(--ink2); line-height: 1.65; }

  /* P43 経過タイムライン（Dayチップ＋アイコン大円） */
  .evts { flex: 1; min-height: 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.6rem;
          max-width: 86rem; margin-inline: auto; width: 100%; align-content: center; position: relative; }
  .evt:not(:first-child)::before { content: ""; position: absolute; top: 1.05rem; right: 50%;
                  width: 100%; border-top: 3px dotted var(--bar); z-index: 0; }
  .evt .chip2 { position: relative; z-index: 1; }
  .evt { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; position: relative; }
  .evt .chip2 { background: var(--strong); color: #fff; font-weight: 700; font-size: 1.05rem;
                padding: .35rem 1.4rem; border-radius: var(--radius-pill); }
  .evt .cir { width: 11rem; height: 11rem; border-radius: 50%; border: 1px solid var(--bar); background: #fff;
              display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .7rem; }
  .evt .cir .ib { width: 2.6rem; height: 2.6rem; margin: 0; color: var(--accent-ink); }
  .evt .cir b { font-size: 1.2rem; color: var(--ink); }
  .evt.on .cir { background: var(--accent); border-color: var(--accent); }
  .evt.on .cir .ib { color: #fff; }
  .evt.on .cir b { color: #fff; }
  .evt p { font-size: 1.1rem; color: var(--ink2); line-height: 1.6; }

  /* P44 Before/After：中央の施策を「前後を変えた主役」として強調 */
  .ba { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 15rem 1fr; align-items: center;
        gap: 1.35rem; max-width: 86rem; margin-inline: auto; width: 100%; }
  .bac { border: 1px solid var(--line); border-radius: 1.1rem; background: #fff; overflow: hidden;
         text-align: center; }
  .bac .hd3 { color: #fff; font-weight: 800; font-size: 1.35rem; padding: .8rem; }
  .bac.before .hd3 { background: var(--accent2); }
  .bac.after .hd3 { background: var(--accent); }
  .bac section { padding: 1.5rem 1.8rem; }
  .bac section + section { border-top: 1px solid var(--line); }
  .bac h5 { font-size: 1.25rem; font-weight: 800; margin-bottom: .6rem; }
  .bac.before h5 { color: var(--strong); }
  .bac.after h5 { color: var(--accent-ink); }
  .bac p { font-size: 1.12rem; color: var(--ink2); line-height: 1.65; }
  .ba .act { align-self: center; min-height: 20rem; text-align: center; color: #fff; background: var(--strong);
             border-radius: var(--radius-card-soft); padding: 1.5rem 1.1rem; font-weight: 700; font-size: 1.12rem;
             line-height: 1.55; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ba .act .lab { color: rgba(255,255,255,.68); font-size: .92rem; letter-spacing: .12em; margin-bottom: .6rem; }
  .ba .act .ar { font-size: 3.2rem; font-weight: 800; color: #fff; opacity: .82; line-height: 1; display: block; margin: .45rem 0; }

  /* P48 スクリーンショット＋番号注釈 */
  .annot { flex: 1; min-height: 0; display: grid; grid-template-columns: 1.45fr .85fr; gap: 2rem;
           max-width: 86rem; margin-inline: auto; width: 100%; align-items: stretch; }
  .annot .screen { position: relative; min-height: 0; border: 1px solid var(--line); border-radius: var(--radius-card-soft);
                   overflow: hidden; background: #fff; }
  .annot .screen .ph { border: 0; border-radius: 0; min-height: 100%; }
  .annot .pin { position: absolute; width: 2.5rem; height: 2.5rem; border-radius: 50%; background: var(--strong); color: #fff;
                display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.15rem;
                box-shadow: 0 0 0 .35rem rgba(255,255,255,.85); }
  .annot .notes { display: flex; flex-direction: column; justify-content: center; gap: .9rem; }
  .annot .note { display: grid; grid-template-columns: 2.5rem 1fr; gap: .9rem; align-items: start; padding: 1rem 1.1rem;
                 border-bottom: 1px solid var(--line); }
  .annot .note .n { width: 2.25rem; height: 2.25rem; border-radius: 50%; background: var(--accent); color: #fff;
                    display: flex; align-items: center; justify-content: center; font-weight: 800; }
  .annot .note b { display: block; color: var(--ink); font-size: 1.15rem; margin-bottom: .25rem; }
  .annot .note p { color: var(--ink2); font-size: 1rem; line-height: 1.5; }

  /* P49 ロードマップ：時間×施策 */
  .roadmap { display: grid; grid-template-columns: 11rem repeat(4, 1fr); max-width: 86rem; margin-inline: auto; width: 100%;
             border: 1px solid var(--line); border-radius: var(--radius-card-soft); overflow: hidden; background: #fff; }
  .roadmap > div { min-height: 3.8rem; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: .75rem 1rem; }
  .roadmap > div:nth-child(5n) { border-right: 0; }
  .roadmap .rh { min-height: 3rem; background: var(--panel); color: var(--ink); font-weight: 700; text-align: center; }
  .roadmap .rl { color: var(--ink); font-weight: 700; display: flex; align-items: center; }
  .roadmap .slot { position: relative; padding: .55rem; }
  .roadmap .barx { height: 100%; min-height: 2.6rem; border-radius: .55rem; background: var(--accent-soft); color: var(--accent-ink);
                   display: flex; align-items: center; padding: .6rem .9rem; font-weight: 700; font-size: 1rem; }
  .roadmap .barx.dark { background: var(--strong); color: #fff; }
  .roadmap .barx.accent { background: var(--accent); color: #fff; }

  /* P50 結論＋根拠引用 */
  .evidence { flex: 1; min-height: 0; display: grid; grid-template-columns: .82fr 1.18fr; gap: 3rem;
              max-width: 84rem; margin-inline: auto; width: 100%; align-items: center; }
  .evidence .claim { font-size: 2.8rem; font-weight: 800; color: var(--ink); line-height: 1.35; letter-spacing: -.02em; }
  .evidence .claim span { background: linear-gradient(transparent 62%, var(--mark) 62%); }
  .evidence .why2 { margin-top: 1.3rem; color: var(--ink2); font-size: 1.2rem; line-height: 1.7; }
  .excerpt { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card);
             padding: 2.6rem 2.7rem 2rem; }
  .excerpt::before { content: "“"; position: absolute; top: .3rem; left: 1.3rem; color: var(--accent); font-size: 4.5rem; font-weight: 900; line-height: 1; }
  .excerpt blockquote { color: var(--ink); font-size: 1.65rem; line-height: 1.65; font-weight: 650; }
  .excerpt mark { color: var(--ink); background: linear-gradient(transparent 58%, var(--mark) 58%); }
  .excerpt cite { display: block; margin-top: 1.3rem; color: var(--gray); font-size: 1rem; line-height: 1.5; font-style: normal; }

  /* P51 活動ギャラリー：主写真1＋補助写真2 */
  .gallery { flex: 1; min-height: 0; display: grid; grid-template-columns: 1.55fr 1fr; grid-template-rows: 1fr 1fr;
             gap: 1rem; max-width: 86rem; margin-inline: auto; width: 100%; }
  .gallery .gpic { position: relative; min-height: 0; overflow: hidden; border-radius: var(--radius-card-soft); background: var(--panel); }
  .gallery .gpic.main { grid-row: 1 / 3; }
  .gallery .gpic .ph { min-height: 100%; border: 0; border-radius: 0; }
  .gallery .gpic img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gallery .cap2 { position: absolute; left: 0; right: 0; bottom: 0; padding: 2.2rem 1.3rem .9rem; color: #fff;
                   background: linear-gradient(transparent, rgba(0,0,0,.72)); font-weight: 700; font-size: 1.1rem; }

  /* P52 意思決定：選択肢×評価軸×推奨 */
  .decisions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.3rem; max-width: 84rem; margin-inline: auto; width: 100%; }
  .dc { position: relative; background: #fff; border: 1px solid var(--line); border-radius: var(--radius-card-soft); padding: 1.5rem; }
  .dc.recommended { border: 2px solid var(--accent); background: var(--accent-soft); }
  .dc.recommended::before { content: "推奨"; position: absolute; top: -.9rem; right: 1.2rem; background: var(--accent); color: #fff;
                            border-radius: var(--radius-pill); padding: .25rem 1rem; font-size: .95rem; font-weight: 800; }
  .dc h4 { font-size: 1.45rem; color: var(--ink); font-weight: 800; margin-bottom: 1rem; }
  .score { display: grid; grid-template-columns: 1fr auto; gap: .45rem; padding: .65rem 0; border-top: 1px solid var(--line);
           color: var(--ink2); font-size: 1.05rem; }
  .score b { color: var(--ink); letter-spacing: .08em; }
  .decision-band { max-width: 84rem; margin-inline: auto; width: 100%; background: var(--strong); color: #fff;
                   border-radius: var(--radius-card-soft); padding: 1.25rem 1.8rem; display: flex; gap: 1.2rem; align-items: center; }
  .decision-band .tag { color: #fff; font-weight: 800; flex: none; border-right: 1px solid rgba(255,255,255,.28); padding-right: 1.2rem; }
  .decision-band p { font-size: 1.2rem; line-height: 1.55; }
  .decision-band b { color: #fff; }

  /* ===== Dynamic型：固定ヘッダー／フッターを使わず、型ごとに全画面を設計 ===== */
  .slide.dyn { padding: 0; display: block; }
  .slide.dyn::before { filter: none; transform: none; opacity: 1; }
  .slide.dyn .corp-logo { left: 3.2rem; bottom: 1.8rem; width: 13rem; height: 2rem; }
  .slide.dyn .page { right: 2.2rem; bottom: 1.7rem; }
  .slide.dyn .pt { z-index: 12; }
  .d-kicker { font-size: 1.05rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
  .d-source { font-size: .95rem; line-height: 1.5; color: var(--gray); }
  .dph { background: linear-gradient(145deg,#e9eaec,#cfd2d5); color:#888b91; display:flex; align-items:center;
         justify-content:center; text-align:center; font-size:1.05rem; font-weight:700; letter-spacing:.04em; }
  .dph .ib { width:2.6rem; height:2.6rem; margin:0 0 .7rem; color:#a5a8ad; }

  /* ID01 数字×実写×根拠 */
  .idnum { height:100%; position:relative; overflow:hidden; background:var(--strong); }
  .idnum .photo { position:absolute; inset:0 0 0 34%; min-height:0; }
  .idnum .photo.dph { align-items:flex-start; justify-content:flex-end; padding:8.5rem 5rem; }
  .idnum .photo::after { content:""; position:absolute; inset:0; background:linear-gradient(90deg,rgba(28,28,31,.9) 0%,rgba(28,28,31,.38) 30%,rgba(28,28,31,0) 62%); }
  .idnum .hero { position:absolute; z-index:3; inset:0 34% 0 0; padding:4.6rem 4.5rem 13rem; color:#fff;
                 background:var(--strong); clip-path:polygon(0 0,100% 0,78% 100%,0 100%); display:flex; flex-direction:column; justify-content:center; }
  .idnum .hero .d-kicker { color:rgba(255,255,255,.58); }
  .idnum .num { font-size:11.4rem; line-height:.82; font-weight:850; letter-spacing:-.075em; margin:.8rem 0 1.2rem; }
  .idnum .num small { font-size:.25em; letter-spacing:0; margin-left:.12em; }
  .idnum .claim { color:#fff; font-size:2.6rem; line-height:1.26; font-weight:780; max-width:13em; }
  .idnum .meaning { color:rgba(255,255,255,.72); font-size:1.2rem; line-height:1.55; max-width:36rem; margin-top:1rem; }
  .idnum .facts { position:absolute; z-index:6; left:3.2rem; right:3.2rem; bottom:2.7rem; min-height:8.2rem; color:#fff;
                  background:linear-gradient(105deg,var(--accent),var(--strong)); clip-path:polygon(1.8% 0,100% 0,98.2% 100%,0 100%);
                  padding:1.4rem 3.1rem; display:grid; grid-template-columns:1.35fr .8fr .8fr .9fr; align-items:center; box-shadow:0 1.1rem 2.5rem rgba(0,0,0,.2); }
  .idnum .fact { min-width:0; padding:0 1.4rem; border-left:1px solid rgba(255,255,255,.24); }
  .idnum .fact:first-child { border-left:0; padding-left:0; }
  .idnum .fact b { display:block; color:rgba(255,255,255,.6); font-size:.78rem; line-height:1.2; letter-spacing:.12em; margin-bottom:.45rem; }
  .idnum .fact span { display:block; color:#fff; font-size:1.02rem; line-height:1.4; font-weight:700; }
  .idnum-slide .page { z-index:9; color:rgba(255,255,255,.62); bottom:3.15rem; }

  /* MD02 大胆Before/After */
  .mdba { height:100%; color:#fff; overflow:hidden; position:relative;
          background:radial-gradient(ellipse at 73% 77%,rgba(255,255,255,.075),transparent 22%),linear-gradient(145deg,#171719,#080809); }
  .mdba .before-plane { position:absolute; z-index:1; inset:0 39% 0 0;
                        background:radial-gradient(circle at 58% 56%,#fff 0%,#f5f5f6 46%,#d5d6d8 100%);
                        clip-path:polygon(0 0,100% 0,68% 100%,0 100%); }
  .mdba .title { position:absolute; z-index:5; left:5.2rem; top:7rem; color:#111114; font-size:4.35rem; line-height:1.18; font-weight:830; max-width:10em; }
  .mdba .change { position:absolute; z-index:6; inset:0; }
  .mdba .state { position:absolute; min-width:0; text-align:center; }
  .mdba .state.before { left:11.5%; bottom:11.25rem; width:29%; color:#29292d; }
  .mdba .state.after { left:53%; bottom:11.25rem; width:30%; color:#fff; }
  .mdba .word { display:block; font-size:1.45rem; line-height:1; letter-spacing:.19em; font-weight:760; opacity:.7; margin-bottom:2.2rem; }
  .mdba .value { display:block; line-height:.7; font-weight:880; letter-spacing:-.09em; white-space:nowrap; }
  .mdba .before .value { font-size:21rem; }
  .mdba .after .value { font-size:30rem; }
  .mdba .value small { font-size:.18em; letter-spacing:0; margin-left:.07em; }
  .mdba .state::after { content:""; display:block; width:72%; height:1px; margin:3.6rem auto 0; background:currentColor; opacity:.25; }
  .mdba .before .word { margin-bottom:1.2rem; }
  .mdba-slide .pt { z-index:9; top:2.1rem; min-width:23rem; padding-bottom:1.15rem; border-bottom:1px solid rgba(255,255,255,.42); text-align:left; }
  .mdba-slide .page { z-index:9; bottom:4rem; width:4.6rem; padding-bottom:.8rem; border-bottom:1px solid rgba(255,255,255,.4); color:rgba(255,255,255,.7); text-align:center; }

  /* ID02 写真Before/After＋施策＋効果 */
  .idba { height:100%; position:relative; overflow:hidden; background:var(--strong); color:#fff; }
  .idba::before { content:""; position:absolute; z-index:3; inset:0 0 45% 0; pointer-events:none;
                  background:linear-gradient(180deg,rgba(0,0,0,.62),rgba(0,0,0,.08) 62%,transparent); }
  .idba .visuals { position:absolute; inset:0; display:grid; grid-template-columns:40% 60%; }
  .idba .photo { position:relative; min-height:0; overflow:hidden; }
  .idba .photo.dph { padding-bottom:9rem; }
  .idba .before-photo.dph { background:linear-gradient(145deg,#bbbfc3,#7e8388); color:#e6e7e9; }
  .idba .after-photo.dph { background:linear-gradient(145deg,#e7e8e9,#bfc3c7); color:#8e9398; }
  .idba .before-photo::after { content:""; position:absolute; inset:0; background:rgba(15,16,18,.28); }
  .idba .after-photo::after { content:""; position:absolute; inset:0; background:linear-gradient(90deg,transparent 42%,rgba(0,0,0,.56)); }
  .idba .seam-arrow { position:absolute; z-index:6; left:40%; top:calc(50% - 5.75rem); transform:translate(-50%,-50%);
                      width:3.4rem; height:3.4rem; border-radius:50%; background:#fff; color:var(--strong);
                      display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:850;
                      box-shadow:0 .25rem 1.2rem rgba(0,0,0,.28); }
  .idba .titlebox { position:absolute; z-index:6; left:4.5rem; top:3.8rem; max-width:42rem; }
  .idba .titlebox .d-kicker { color:rgba(255,255,255,.66); }
  .idba h2 { color:#fff; font-size:3.45rem; line-height:1.16; margin-top:.65rem; text-shadow:0 .15rem .8rem rgba(0,0,0,.24); }
  .idba .result-mark { position:absolute; z-index:6; right:4.5rem; bottom:16.8rem; text-align:right; color:#fff; }
  .idba .result-mark span { display:block; color:rgba(255,255,255,.62); font-size:.9rem; letter-spacing:.16em; font-weight:850; }
  .idba .result-mark strong { display:block; color:#fff; font-size:8.8rem; line-height:.9; letter-spacing:-.07em; text-shadow:0 .3rem 1.4rem rgba(0,0,0,.26); }
  .idba .result-mark strong small { font-size:.3em; letter-spacing:0; margin-left:.08em; }
  .idba .result-mark p { color:#fff; font-size:1.3rem; line-height:1.4; font-weight:750; }
  .idba .d-source { position:absolute; z-index:6; right:4.5rem; bottom:12.5rem; color:rgba(255,255,255,.72); text-shadow:0 .12rem .5rem rgba(0,0,0,.32); }
  .idba .info-band { position:absolute; z-index:7; inset:auto 0 0 0; min-height:11.5rem; background:#141417;
                      padding:2.2rem 0 2rem; display:grid; grid-template-columns:40% 1.25fr 1fr; align-items:start; }
  .idba .info { align-self:stretch; }
  .idba .info { min-width:0; padding:0 2.6rem; border-left:1px solid rgba(255,255,255,.2); }
  .idba .info:first-child { padding-left:4.5rem; padding-right:3rem; border-left:0; }
  .idba .info:last-child { padding-right:8.5rem; }
  .idba .info b { display:block; color:rgba(255,255,255,.58); font-size:.78rem; line-height:1.2; letter-spacing:.14em; margin-bottom:.65rem; }
  .idba .info p { color:#fff; font-size:1.1rem; line-height:1.55; }
  .idba .info.action p { font-size:1.23rem; font-weight:750; }
  .idba .info.action strong { color:#fff; }
  .idba-slide .pt { z-index:10; color:rgba(255,255,255,.68); }
  .idba-slide .page { z-index:10; color:rgba(255,255,255,.62); bottom:1.7rem; }

  /* MD03 流れる3ステップ */
  .mdflow { height:100%; position:relative; overflow:hidden; background:var(--strong); color:#fff; }
  .mdflow .head3 { position:absolute; z-index:2; left:4.6rem; top:4.1rem; }
  .mdflow h2 { color:#fff; font-size:3.5rem; line-height:1.2; margin-top:.65rem; max-width:18em; }
  .mdflow .steps { position:absolute; z-index:1; inset:auto 0 0 0; display:grid; grid-template-columns:1fr 1fr 1fr; align-items:end; }
  .mdflow .step { display:flex; flex-direction:column; padding:2.6rem 3rem; }
  .mdflow .step:nth-child(1) { height:21rem; background:#3d3e44; }
  .mdflow .step:nth-child(2) { height:29.5rem; background:var(--accent2); }
  .mdflow .step:nth-child(3) { height:38rem; background:color-mix(in srgb,var(--accent) 12%,#fff 88%); color:var(--strong); }
  .mdflow .n { line-height:1; font-weight:850; opacity:.3; letter-spacing:-.04em; font-size:4rem; }
  .mdflow .step:nth-child(2) .n { font-size:5.2rem; }
  .mdflow .step:nth-child(3) .n { font-size:6.6rem; opacity:.22; }
  .mdflow h3 { color:inherit; font-size:1.8rem; margin:.8rem 0 .55rem; }
  .mdflow .step:nth-child(2) h3 { font-size:2.2rem; }
  .mdflow .step:nth-child(3) h3 { font-size:2.7rem; }
  .mdflow p { color:rgba(255,255,255,.75); font-size:1.1rem; line-height:1.65; max-width:24em; }
  .mdflow .step:nth-child(3) p { color:rgba(29,29,31,.72); font-size:1.15rem; }
  .mdflow-slide .pt { z-index:10; }
  .mdflow-slide .page { z-index:10; }

  /* ID03 プロセス＋判断ポイント */
  .idflow { height:100%; padding:3.8rem 4.6rem 3rem 4rem; display:grid; grid-template-columns:.78fr 1.22fr; gap:4rem; background:#fff; }
  .idflow .lead { display:flex; flex-direction:column; justify-content:center; }
  .idflow .lead h2 { font-size:3.45rem; line-height:1.2; margin:.8rem 0 1.3rem; }
  .idflow .lead p { color:var(--ink2); font-size:1.15rem; line-height:1.7; }
  .idflow .rail { position:relative; align-self:center; width:100%; display:flex; flex-direction:column; }
  .idflow .rail::before { content:""; position:absolute; left:calc(1.3rem - 1px); top:2.6rem; bottom:2rem; border-left:2px solid var(--strong); }
  .idflow .prow, .idflow .gate { position:relative; z-index:1; display:grid; grid-template-columns:2.6rem 1fr; gap:1.7rem; align-items:center; }
  .idflow .prow { padding:1.8rem 0; }
  .idflow .pn { justify-self:center; background:#fff; padding:.45rem 0; color:var(--ink); font-size:2.3rem; font-weight:850; line-height:1; letter-spacing:-.02em; }
  .idflow h3 { display:inline; font-size:1.8rem; margin-right:.9rem; }
  .idflow .prow p { display:inline; color:var(--ink2); font-size:1.02rem; line-height:1.5; }
  .idflow .gate { padding:1rem 0; }
  .idflow .dia { justify-self:center; width:1.25rem; height:1.25rem; background:#fff; border:.19rem solid var(--strong); transform:rotate(45deg); }
  .idflow .lbl { display:flex; align-items:baseline; gap:1rem; }
  .idflow .lbl i { font-style:normal; align-self:center; color:#fff; background:var(--strong); font-size:.72rem; font-weight:850; letter-spacing:.12em; padding:.28rem .55rem; border-radius:.3rem; }
  .idflow .lbl b { font-size:1.25rem; }
  .idflow .lbl span { color:var(--ink2); font-size:.98rem; }
  .idflow .legend { display:flex; align-items:center; gap:.85rem; margin-top:2.4rem; color:var(--ink2); font-size:.98rem; font-weight:700; }
  .idflow .legend .dia { width:.95rem; height:.95rem; border-width:.16rem; }
  .idflow .gate.key { background:var(--panel); border-radius:.8rem; padding:1.15rem 1.4rem 1.15rem 0; margin:.35rem 0; }
  .idflow .gate.key .dia { background:var(--strong); }
  .idflow .gate.key .lbl b { font-size:1.5rem; }

  /* MD04 人物写真＋巨大引用 */
  .mdperson { height:100%; position:relative; overflow:hidden; background:var(--strong); color:#fff; }
  .mdperson .photo { position:absolute; inset:0; }
  .mdperson .photo.dph { justify-content:flex-end; padding-right:9rem; }
  .mdperson .photo::after { content:""; position:absolute; inset:0;
      background:linear-gradient(90deg,rgba(29,29,31,.95) 0%,rgba(29,29,31,.8) 34%,rgba(29,29,31,.35) 62%,transparent 82%),
                 linear-gradient(0deg,rgba(29,29,31,.4),transparent 28%); }
  .mdperson .copy { position:absolute; z-index:3; left:4.8rem; top:50%; transform:translateY(-50%); width:52%; }
  .mdperson blockquote { margin-top:2.2rem; font-size:3.8rem; line-height:1.42; font-weight:800; letter-spacing:-.025em; text-shadow:0 .15rem 1rem rgba(0,0,0,.3); }
  .mdperson blockquote::before { content:"“"; display:block; color:color-mix(in srgb,var(--accent2) 45%,#fff 55%); font-size:1.6em; line-height:.6; margin-bottom:.1rem; }
  .mdperson .who { margin-top:2.6rem; padding-top:1.3rem; border-top:1px solid rgba(255,255,255,.34); max-width:26rem; }
  .mdperson .who b { display:block; color:#fff; font-size:1.45rem; }
  .mdperson .who span { color:rgba(255,255,255,.66); font-size:1.02rem; }

  /* ID05 推奨案スポットライト */
  .iddecision { height:100%; padding:3.6rem 4rem 3rem; display:grid; grid-template-columns:1.45fr .55fr; grid-template-rows:auto 1fr; gap:1.4rem; background:#fff; }
  .iddecision .topline { grid-column:1/-1; display:flex; justify-content:space-between; align-items:flex-end; }
  .iddecision h2 { font-size:3.2rem; }
  .iddecision .reco { background:var(--strong); color:#fff; border-radius:var(--radius-card); padding:3rem 3.2rem 2.8rem; display:flex; flex-direction:column; justify-content:space-between; }
  .iddecision .reco .tag2 { color:rgba(255,255,255,.58); font-size:1rem; letter-spacing:.16em; font-weight:800; }
  .iddecision .reco h3 { color:#fff; font-size:4.3rem; margin:0 0 1.2rem; letter-spacing:-.02em; }
  .iddecision .reco p { color:rgba(255,255,255,.8); font-size:1.3rem; line-height:1.7; max-width:32em; }
  .iddecision .criteria { display:grid; grid-template-columns:repeat(3,1fr); gap:1.2rem; margin-top:2rem; }
  .iddecision .criterion { border-top:1px solid rgba(255,255,255,.25); padding-top:1rem; font-size:1.1rem; color:rgba(255,255,255,.72); }
  .iddecision .criterion b { color:#fff; display:block; font-size:1.6rem; letter-spacing:.2em; margin-top:.5rem; }
  .iddecision .criterion i { font-style:normal; opacity:.32; }
  .iddecision .alts { display:grid; grid-template-rows:1fr 1fr; gap:1rem; }
  .iddecision .alt { background:var(--panel); border-radius:var(--radius-card-soft); padding:1.8rem 2rem; display:flex; flex-direction:column; justify-content:center; }
  .iddecision .alt .tag3 { color:var(--ink2); font-size:.75rem; letter-spacing:.16em; font-weight:850; margin-bottom:.75rem; }
  .iddecision .alt h4 { font-size:1.35rem; margin-bottom:.6rem; } .iddecision .alt p { color:var(--ink2); font-size:1rem; line-height:1.55; }

  /* MD06 全面引用 */
  .mdquote { height:100%; background:var(--strong); color:#fff; padding:5rem 6rem; display:flex; flex-direction:column; justify-content:center; }
  .mdquote .d-kicker { color:rgba(255,255,255,.5); }
  .mdquote blockquote { color:#fff; font-size:4.9rem; line-height:1.5; font-weight:800; letter-spacing:-.03em; margin:2.2rem 0 0; }
  .mdquote blockquote span { border-bottom:.13em solid color-mix(in srgb,var(--accent2) 55%,#fff 45%); padding-bottom:.05em; }
  .mdquote .by { margin-top:3.4rem; color:rgba(255,255,255,.68); font-size:1.15rem; }

  /* ID06 エディトリアル根拠 */
  .ideditorial { height:100%; display:grid; grid-template-columns:1.15fr .85fr; background:#fff; }
  .ideditorial .quote2 { padding:5rem 4.2rem; display:flex; flex-direction:column; justify-content:center; }
  .ideditorial .quote2 blockquote { font-size:2.9rem; line-height:1.5; font-weight:780; letter-spacing:-.02em; }
  .ideditorial .quote2 mark { color:var(--ink); background:linear-gradient(transparent 58%,color-mix(in srgb,var(--mark) 68%,var(--accent2) 32%) 58%); }
  .ideditorial .quote2 .d-source { margin-top:1.6rem; }
  .ideditorial .side { display:grid; grid-template-rows:47% 53%; background:var(--panel); }
  .ideditorial .photo { min-height:0; }
  .ideditorial .notes { padding:2.4rem 2.8rem; display:flex; flex-direction:column; justify-content:center; gap:1.2rem; }
  .ideditorial .nlabel { font-size:.8rem; letter-spacing:.16em; font-weight:850; color:var(--ink2); padding-bottom:.85rem; border-bottom:1px solid var(--line); }
  .ideditorial .note { font-size:1.05rem; line-height:1.75; color:var(--ink2); }
  .ideditorial .note b { display:block; color:var(--ink); font-size:1.12rem; margin-bottom:.15rem; }
  .ideditorial .caveat { font-size:.92rem; line-height:1.6; color:var(--ink2); border-left:2px solid var(--bar); padding-left:.95rem; }

  /* P45 進捗ゲージ */
  .ggs { display: flex; gap: var(--grid-gap); justify-content: center; max-width: 84rem; margin-inline: auto; width: 100%; }
  .gg { flex: 1 1 0; max-width: 27rem; background: #fff; border: 1px solid var(--line); border-radius: var(--radius-card-soft);
        padding: 1.8rem 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: .9rem; }
  .gg .lb { font-size: 1.25rem; font-weight: 700; color: var(--ink); }
  .gg svg { width: 11.5rem; height: 11.5rem; }
  .gg .ds { font-size: 1.1rem; color: var(--ink2); line-height: 1.55; }
  .sumband { display: flex; align-items: center; gap: 1.6rem; background: var(--panel); border-radius: var(--radius-card-flat);
             padding: 1.5rem 2rem; max-width: 84rem; margin-inline: auto; width: 100%; }
  .sumband .tagchip { background: var(--strong); color: #fff; font-weight: 700; font-size: 1.1rem;
                      padding: .55rem 1.3rem; border-radius: .45rem; flex: none; }
  .sumband .bignum { font-size: 2.5rem; font-weight: 800; color: var(--ink); flex: none; letter-spacing: -.02em; }
  .sumband p { font-size: 1.1rem; color: var(--ink2); line-height: 1.6; }

  /* P46 ステップ別チェックリスト（列型） */
  .stepcols { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr auto 1fr auto 1fr;
              gap: 1.2rem; align-items: stretch; align-content: center; max-width: 86rem; margin-inline: auto; width: 100%; }
  .sc { background: var(--panel); border-radius: var(--radius-card-flat); padding: 1.5rem 1.3rem; display: flex;
        flex-direction: column; gap: 1rem; }
  .sc .pill2 { color: #fff; font-weight: 700; font-size: 1.15rem; text-align: center; padding: .55rem;
               border-radius: var(--radius-pill); }

<script>
(function(){
  if(new URLSearchParams(location.search).has('sw-render')) document.documentElement.classList.add('sw-render');
  const slides=[...document.querySelectorAll('.slide')], total=slides.length;
  slides.forEach((slide,index)=>{
    slide.querySelectorAll('.pt').forEach(x=>x.remove());
    let page=slide.querySelector('.page');
    if(!slide.classList.contains('cover')){
      if(!page){page=document.createElement('div');page.className='page';slide.appendChild(page);}

<style id="sw-browser-editor-style">

  body.sw-browser-editing [data-sw-editor-editable="true"]:hover { outline-color:#1769e0; }
  body.sw-browser-editing [data-sw-editor-editable="true"]:focus { outline:2px solid #1769e0; }
  body.sw-browser-editing [data-sw-editor-image="true"] { cursor:pointer; outline:2px dashed transparent; outline-offset:-3px; }
  body.sw-browser-editing [data-sw-editor-image="true"]:hover { outline-color:#1769e0; filter:brightness(.94); }
  body.sw-browser-editing [data-sw-editor-svg-text="true"] { cursor:text; outline:1px dashed transparent; outline-offset:2px; }
  body.sw-browser-editing [data-sw-editor-svg-text="true"]:hover { outline-color:#1769e0; }
  .sw-editor-svg-input { position:fixed; z-index:2147483646; box-sizing:border-box; margin:0; padding:0 .12em;
