name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: macos
            bundle: dmg
          - os: windows-latest
            artifact: windows
            bundle: nsis
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build dependencies
        shell: bash
        run: |
          npm install
          python -m pip install pyinstaller
      - name: Build Python sidecar
        run: npm run build:backend
      - name: Generate application icons
        run: npm run icons
      - name: Build installer
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}
      - uses: actions/upload-artifact@v4
        with:
          name: live-mtg-${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" artifacts/live-mtg-macos/dmg/*.dmg artifacts/live-mtg-windows/nsis/*-setup.exe --generate-notes --verify-tag
