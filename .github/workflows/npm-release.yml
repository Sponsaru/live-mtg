name: npm release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm test
      - run: npm run build:package
      - run: npm pack --dry-run ./dist/npm
      - name: Publish stable release
        run: npm publish ./dist/npm --access public --tag latest
