name: cross-platform test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm test
      - name: CLI starts on this OS
        run: node cli/live-mtg.mjs --help
        env:
          LIVE_MTG_HOME: ${{ runner.temp }}/live-mtg-test
