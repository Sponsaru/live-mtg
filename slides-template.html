<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #11233a; --ink2: #33485f; --gray: #7a8a98;
    --panel: #f3f8fc; --line: #dde8f1;

    background: #fff; -webkit-font-smoothing: antialiased;

  h1, h2, h3, h4, p, li, .bigstmt, .substmt, .why, .take, .hsub, .lead, .quote {
    word-break: auto-phrase; text-wrap: balance; overflow-wrap: break-word;
  }
  .slide {
    width: 100vw; height: 100vh; background: #fff; position: relative;
    padding: clamp(40px, 6vh, 76px) clamp(60px, 7vw, 116px) clamp(56px, 7vh, 88px);
    display: flex; flex-direction: column; scroll-snap-align: start;
    overflow: hidden; border-bottom: 1px solid var(--line);
  }
  .slide::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(1200px 520px at 88% -8%, rgba(0,160,233,.07), transparent 60%),
      radial-gradient(900px 480px at -6% 108%, rgba(10,58,92,.05), transparent 60%);
    z-index: 0;

  /* sponsaru テーマ（白ベース × ネイビー#15233f × オレンジ#f15a24。about.sponsaru.com 準拠） */
  body[data-theme="sponsaru"] {
    --ink: #15233f; --ink2: #3a475e; --gray: #8a93a3;
    --blue: #15233f; --blue-ink: #f15a24; --blue-deep: #0e1a30;
    --blue-soft: #fdeee5; --blue-soft2: #f5f7fa; --mark: #fbd9c7;
  }
  body[data-theme="sponsaru"] .slide::after {
    background: none; content: "sponsaru."; width: auto; height: auto;
    font-weight: 900; font-size: clamp(18px, 2.2vh, 24px); color: #f15a24; letter-spacing: .02em;
  }
  .head { padding-bottom: 20px; border-bottom: 2px solid var(--blue); }
  .head h1 { font-size: clamp(34px, 3.8vw, 50px); color: var(--ink); font-weight: 800; letter-spacing: -.015em; line-height: 1.18; }
  .head .hsub { font-size: clamp(20px, 1.7vw, 23px); color: var(--gray); margin-top: 12px; line-height: 1.5; }
  .head .kick { font-size: 19px; color: var(--blue-ink); font-weight: 800; letter-spacing: .08em; margin-bottom: 10px; }

  .stage { flex: 1; min-height:0; display: flex; flex-direction: column; justify-content: center; gap: clamp(20px, 3.2vh, 36px); }
  .stage:has(.tree-map) { justify-content:flex-start; overflow:auto; overscroll-behavior:contain; scrollbar-gutter:stable; }
  .mindmap-page { padding:0; }
  .mindmap-page .head { flex:0 0 auto; padding:14px 32px 12px; background:rgba(255,255,255,.96); z-index:12; }
  .mindmap-page .head .kick { font-size:12px; margin-bottom:3px; }
  .mindmap-page .head h1 { font-size:clamp(22px,2.1vw,30px); display:inline; }
  .mindmap-page .head .hsub { display:inline; margin:0 0 0 16px; font-size:14px; }
  .mindmap-page .stage { overflow:scroll; touch-action:pan-x pan-y; cursor:grab; scrollbar-gutter:stable both-edges; }
  .mindmap-page .stage.dragging { cursor:grabbing; user-select:none; }
  .mindmap-page .stage::-webkit-scrollbar { width:13px; height:13px; }
  .mindmap-page .stage::-webkit-scrollbar-track { background:#eef3f7; }
  .mindmap-page .stage::-webkit-scrollbar-thumb { background:#9eb4c7; border:3px solid #eef3f7; border-radius:10px; }
  .slide.center .stage { align-items: center; text-align: center; gap: clamp(24px, 3.8vh, 42px); }

  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 22px; padding: clamp(24px, 3.2vh, 36px) clamp(28px, 3vw, 42px); }
  .panel h3 { font-size: clamp(24px, 2.2vw, 30px); color: var(--ink); font-weight: 800; margin-bottom: 16px; letter-spacing: -.01em; }
  .panel p, .panel li { font-size: clamp(19px, 1.85vw, 23px); color: var(--ink2); line-height: 1.65; }
  .panel ul { padding-left: 24px; }
  .panel li { margin-bottom: 11px; }
  .panel li:last-child { margin-bottom: 0; }
  b, strong { color: var(--ink); font-weight: 700; }
  .bl { color: var(--blue-ink); font-weight: 800; }

  .chip { display: inline-block; font-weight: 800; padding: 8px 26px; border-radius: 980px; font-size: clamp(19px,2vw,23px); letter-spacing: .04em; }
  .chip.blue { background: var(--blue); color: #fff; }
  .chip.soft { background: var(--blue-soft); color: var(--blue-ink); border: 1px solid var(--line); }

  .bigstmt { font-size: clamp(42px, 5.4vw, 76px); font-weight: 800; letter-spacing: -.025em; line-height: 1.16; color: var(--ink); }
  .bigstmt .pink { color: var(--blue-ink); background: linear-gradient(transparent 58%, var(--mark) 58%); padding: 0 .06em; }
  .substmt { font-size: clamp(22px, 2.4vw, 30px); color: var(--ink2); line-height: 1.7; max-width: 32ch; }
  .substmt b { color: var(--ink); }

  .kpis { display: flex; gap: 22px; }
  .kpi { flex: 1; background: var(--blue-soft2); border: 1px solid var(--line); border-radius: 22px; padding: clamp(26px,3.4vh,40px) 24px;
         text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  .kpi .v { font-size: clamp(44px, 4.8vw, 70px); font-weight: 900; color: var(--blue-ink); line-height: 1.0; letter-spacing: -.03em; }
  .kpi .v small { font-size: .42em; font-weight: 800; }
  .kpi .l { font-size: clamp(19px, 1.7vw, 22px); color: var(--ink2); font-weight: 600; line-height: 1.45; }
  .kpi.hero { background: var(--blue); }
  .kpi.hero .v { color: #fff; font-size: clamp(54px, 6vw, 90px); }
  .kpi.hero .l { color: #eaf8ff; }

  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .col .kick { font-size: 20px; color: var(--blue-ink); font-weight: 800; margin-bottom: 8px; letter-spacing: .03em; }
  .col h3 { font-size: clamp(24px, 2.2vw, 29px); color: var(--ink); font-weight: 800; margin-bottom: 14px; letter-spacing: -.01em; }
  .col ul { padding-left: 22px; }
  .col li { font-size: clamp(19px, 1.8vw, 22px); color: var(--ink2); line-height: 1.6; margin-bottom: 12px; }
  .col li:last-child { margin-bottom: 0; }

  .why { background: var(--blue-deep); color: #eaf4fb; border-radius: 22px; padding: clamp(26px,3.4vh,40px) clamp(30px,3vw,44px);
         font-size: clamp(22px, 2.3vw, 30px); line-height: 1.65; font-weight: 600; }
  .why b, .why strong { color: #fff; font-weight: 800; }
  .why .pink { color: #fff; font-weight: 800; border-bottom: 2px solid var(--blue); }

  .take { background: var(--blue-soft); border: 1px solid var(--line); border-radius: 22px; padding: clamp(24px,3vh,36px) clamp(30px,3vw,44px);
          font-size: clamp(21px, 2.1vw, 27px); color: var(--ink2); line-height: 1.6; font-weight: 600; }
  .take b { color: var(--blue-ink); font-weight: 800; }

  .quote { font-size: clamp(24px, 2.6vw, 34px); color: var(--ink); font-weight: 700; line-height: 1.5; letter-spacing: -.01em; }
  .quote::before { content: "“"; color: var(--blue); font-weight: 900; margin-right: .04em; }
  .quote::after  { content: "”"; color: var(--blue); font-weight: 900; margin-left: .04em; }
  .qby { font-size: clamp(18px,1.6vw,20px); color: var(--gray); font-weight: 600; margin-top: 14px; letter-spacing: .04em; }

  .flow { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: stretch; }
  .step { background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: clamp(22px,2.8vh,32px) clamp(20px,2vw,28px); }
  .step .n { font-size: 18px; color: var(--blue-ink); font-weight: 800; letter-spacing: .08em; margin-bottom: 8px; }
  .step h4 { font-size: clamp(21px,2vw,26px); color: var(--ink); font-weight: 800; line-height: 1.3; margin-bottom: 6px; }
  .step p { font-size: clamp(18px,1.7vw,21px); color: var(--ink2); line-height: 1.5; }
  .step.on { background: var(--blue); border-color: var(--blue); }
  .step.on .n { color: #cfeffd; } .step.on h4 { color: #fff; } .step.on p { color: #eaf8ff; }

  .cover { justify-content: center; align-items: center; text-align: center; }
  .cover::before { background:
      radial-gradient(1100px 620px at 50% -10%, rgba(0,160,233,.16), transparent 62%),
      radial-gradient(900px 520px at 50% 112%, rgba(10,58,92,.10), transparent 60%); }
  .cover-inner { display: flex; flex-direction: column; align-items: center; gap: clamp(20px, 3vh, 32px); }
  .cover-rule { width: 76px; height: 5px; border-radius: 3px; background: var(--blue); }
  .cover-title { font-size: clamp(48px, 7vw, 92px); color: var(--ink); font-weight: 900; letter-spacing: -.03em; line-height: 1.1; }
  .cover-sub { font-size: clamp(21px, 2.3vw, 29px); color: var(--ink2); line-height: 1.7; }
  .cover-sub span { color: var(--blue-ink); font-weight: 800; }
  .cover-meta { font-size: 18px; color: var(--gray); letter-spacing: .1em; line-height: 1.7; }

  /* 図形（Mermaid） */
  .slide .mermaid { display: flex; justify-content: center; align-items: center; width: 100%; }
  .slide .mermaid svg { width: 100%; height: 64vh; max-width: 100%; max-height: 64vh; }
  .slide .mmd-note { color: var(--gray); font-size: clamp(18px,1.8vw,22px);
    padding: 22px 26px; border: 1px dashed var(--line); border-radius: 16px; background: var(--panel); text-align: center; }

  /* 左から右へ広がる、開閉できる階層型マインドマップ */
  .tree-map { position:relative; width:max-content; min-width:100%; height:auto; min-height:100%; flex:0 0 auto; display:flex;
    align-items:flex-start; justify-content:flex-start; gap:72px; padding:80px 120px; }
  .tree-lines { position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; z-index:0; }
  .tree-lines path { fill:none; stroke:#5b91df; stroke-width:2.2; stroke-linecap:round; opacity:.95; }
  .tree-root-wrap,.branch-head,.tree-branches,.tree-leaves { position:relative; z-index:1; }
  .tree-root-wrap,.branch-head { display:flex; align-items:center; gap:12px; flex:0 0 auto; min-width:max-content; overflow:visible; }
  .tree-root-wrap,.tree-branches { align-self:center; }
  .tree-branches { display:flex; flex-direction:column; justify-content:center; gap:clamp(12px,1.8vh,22px); }
  .tree-branch { display:grid; grid-template-columns:max-content max-content;
    align-items:center; column-gap:72px; min-height:48px; overflow:visible; }
  .tree-leaves { display:flex; flex-direction:column; gap:clamp(8px,1vh,12px); max-height:2200px; opacity:1; transform:translateX(0); overflow:visible; visibility:visible; transition:max-height .38s ease,opacity .24s ease,transform .38s cubic-bezier(.2,.8,.2,1),visibility 0s; }
  .tree-node { border-radius:10px; padding:clamp(10px,1.25vh,15px) clamp(16px,1.6vw,24px);
    color:#102238; font-size:clamp(15px,1.25vw,20px); line-height:1.32; box-shadow:0 1px 0 rgba(16,34,56,.04); }
  .tree-node.root { background:#b8bef8; font-size:clamp(18px,1.55vw,25px); font-weight:750; white-space:nowrap; }
  .tree-node.branch { background:#b9d3ef; font-size:clamp(17px,1.4vw,22px); font-weight:750; white-space:nowrap; }
  .tree-node.leaf { background:#a9ded5; max-width:420px; }
  .tree-node.leaf.tone-1 { background:#b6e1ce; } .tree-node.leaf.tone-2 { background:#c4dfaa; }
  .tree-node.leaf.tone-3 { background:#f2dda0; } .tree-node.leaf.tone-4 { background:#d7c7ef; }
  .tree-subbranch { display:grid; grid-template-columns:max-content max-content; align-items:center; column-gap:64px; overflow:visible; transition:grid-template-columns .38s cubic-bezier(.2,.8,.2,1),column-gap .38s ease; }
  .tree-items { display:flex; flex-direction:column; gap:7px; max-width:2200px; opacity:1; visibility:visible; overflow:visible; transform:translateX(0); transition:max-width .38s cubic-bezier(.2,.8,.2,1),opacity .24s ease,transform .38s cubic-bezier(.2,.8,.2,1),visibility 0s; }
  .tree-node.group { background:#d9e7f5; font-weight:800; font-size:clamp(14px,1.1vw,17px); width:max-content; min-width:240px; max-width:none; white-space:nowrap; }
  .tree-node.item { background:#a9ded5; width:max-content; min-width:420px; max-width:560px; font-size:clamp(13px,1.05vw,17px); }
  .tree-node.root,.tree-node.branch,.tree-node.group,.tree-node.item { cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:16px; user-select:none; }
  .tree-node.root::after,.tree-node.branch::after,.tree-node.group::after,.tree-node.item::after { content:'›'; flex:0 0 auto; font-weight:900; font-size:20px; line-height:1; opacity:.7; transition:transform .25s cubic-bezier(.2,.8,.2,1); }
  .tree-node.item.tone-1 { background:#b6e1ce; } .tree-node.item.tone-2 { background:#c4dfaa; }
  .tree-node.item.tone-3 { background:#f2dda0; } .tree-node.item.tone-4 { background:#d7c7ef; }
  .tree-branch.collapsed .tree-leaves { max-height:0; opacity:0; visibility:hidden; transform:translateX(-12px); overflow:hidden; pointer-events:none; transition:max-height .3s ease,opacity .18s ease,transform .3s ease,visibility 0s .3s; }
  .tree-branch.collapsed { grid-template-columns:max-content 0fr; }
  .tree-subbranch.group-collapsed { grid-template-columns:max-content 0fr; column-gap:0; }
  .tree-subbranch.group-collapsed .tree-items { max-width:0; opacity:0; visibility:hidden; overflow:hidden; pointer-events:none; transform:translateX(-12px); transition:max-width .3s ease,opacity .18s ease,transform .3s ease,visibility 0s .3s; }
  .tree-map:not(.root-collapsed) .tree-node.root::after,.tree-branch:not(.collapsed)>.branch-head .tree-node.branch::after,.tree-subbranch:not(.group-collapsed)>.tree-node.group::after { transform:rotate(90deg); }
  .tree-map.root-collapsed .tree-branches { display:none; }
  .tree-detailrow { display:grid; grid-template-columns:max-content 0fr; align-items:center; column-gap:0; transition:grid-template-columns .38s cubic-bezier(.2,.8,.2,1),column-gap .38s ease; }
  .tree-detailrow:has(.tree-detail.show) { grid-template-columns:max-content max-content; column-gap:64px; }
  .tree-detail { display:block; background:#f7f4ff; border:0 solid #d8d0ef; width:640px; max-width:720px; max-height:0; padding:0; overflow:hidden; opacity:0; visibility:hidden; transform:translateX(-14px) scale(.97); font-size:clamp(13px,1vw,16px); line-height:1.5; transition:opacity .24s ease,transform .38s cubic-bezier(.2,.8,.2,1),max-height .38s ease,padding .38s ease,border-width .2s ease,visibility 0s .38s; }
  .tree-detail.show { max-height:560px; padding:clamp(10px,1.25vh,15px) clamp(16px,1.6vw,24px); border-width:1px; opacity:1; visibility:visible; overflow:auto; transform:translateX(0) scale(1); transition-delay:0s; } .tree-node.item.detail-open::after { transform:rotate(90deg); }
  .tree-detail .detail-status { display:inline-block; margin-bottom:6px; padding:2px 8px; border-radius:10px; background:#e5def5; font-size:11px; font-weight:800; }

  /* PDF保存ボタン（右下フローティング・印刷時は消える） */
  .pdfbtn { position: fixed; right: 22px; bottom: 22px; z-index: 50;
    font-family: inherit; font-size: 14px; font-weight: 800; letter-spacing: .02em;
    background: var(--blue); color: #fff; border: none; border-radius: 24px;
    padding: 11px 20px; cursor: pointer; box-shadow: 0 6px 18px rgba(10,60,90,.3);
    display: inline-flex; align-items: center; gap: 7px; opacity: .92; }
  .pdfbtn:hover { opacity: 1 }
  @media print {
    /* ページ寸法は印刷時にJSが「いまの画面サイズ」を@pageに設定＝画面と同じ描画がそのまま1ページに（下のfallbackは保険） */
    @page { size: 1440px 810px; margin: 0 }
    html { scroll-snap-type: none; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }  /* 背景色・図の色をそのまま刷る */
    .slide { box-shadow: none; border-radius: 0; border-bottom: none;
             page-break-after: always; break-inside: avoid; }
    .slide:last-of-type { page-break-after: auto; }
    .pdfbtn { display: none !important; }
    .tree-map.root-collapsed .tree-branches { display:flex !important; }
    .tree-branch.collapsed { grid-template-columns:minmax(170px,220px) minmax(260px,1fr) !important; }
    .tree-branch.collapsed .tree-leaves { display:flex !important; }
    .tree-branch.collapsed .tree-leaves { max-height:none !important; opacity:1 !important; visibility:visible !important; transform:none !important; overflow:visible !important; }
    .tree-map { transform:scale(.64); width:156.25%; height:156.25%; transform-origin:center; }
    .tree-detail { display:none !important; }
  }
</style>
</head>
<body data-theme="{{THEME}}">
<button class="pdfbtn" onclick="window.print()" title="印刷ダイアログで「PDFに保存」を選ぶ">🖨 PDF保存</button>
{{SLIDES}}
<!-- Mermaid本体（相対参照。サーバ配信でも meetings/<id>/ から直接開いても解決） -->
<script src="../../mermaid.min.js"></script>
<script>
  const GENERATED_UPDATED={{DATA_UPDATED}};
  // PDF保存：印刷ページを「いまの画面サイズ」に合わせる＝画面と同じ描画がそのまま1スライド1ページに
  window.addEventListener('beforeprint', function(){
    var s=document.getElementById('pgsize');
    if(!s){ s=document.createElement('style'); s.id='pgsize'; document.body.appendChild(s); }
    s.textContent='@page{size:'+window.innerWidth+'px '+window.innerHeight+'px;margin:0}';
  });

  // ページ番号を自動付与（cover以外）
  const slides=[...document.querySelectorAll('.slide')];
  slides.forEach((s,i)=>{
    if(s.classList.contains('cover')) return;
    const p=document.createElement('div'); p.className='page';
    p.textContent=(i+1)+' / '+slides.length; s.appendChild(p);
  });

  // 階層マップの曲線をノード位置に合わせて描画する。
  function drawTree(tree){
    var svg=tree.querySelector('.tree-lines'), root=tree.querySelector('.tree-node.root');
    if(!svg||!root) return;
    svg.innerHTML=''; var tr=tree.getBoundingClientRect();
    function point(el,side){ var r=el.getBoundingClientRect(); return {
      x:(side==='left'?r.left:r.right)-tr.left, y:r.top-tr.top+r.height/2 }; }
    function link(a,b){ var p=point(a,'right'),q=point(b,'left'),bend=Math.max(24,(q.x-p.x)*.48);
      var path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M'+p.x+' '+p.y+' C'+(p.x+bend)+' '+p.y+' '+(q.x-bend)+' '+q.y+' '+q.x+' '+q.y); svg.appendChild(path); }
    if(tree.classList.contains('root-collapsed')) return;
    tree.querySelectorAll('[data-parent]').forEach(function(el){
      if(el.offsetParent===null || (el.closest('.tree-branch.collapsed')&&!el.classList.contains('branch')) || (el.closest('.tree-subbranch.group-collapsed')&&!el.classList.contains('group')) || (el.classList.contains('tree-detail')&&!el.classList.contains('show')))return;
      var parent=tree.querySelector('[data-node-id="'+el.dataset.parent+'"]'); if(parent)link(parent,el);
    });
  }
  function drawTrees(){ document.querySelectorAll('[data-tree]').forEach(drawTree); }
  function animateTrees(){ var started=performance.now(); function frame(now){drawTrees();if(now-started<430)requestAnimationFrame(frame);} requestAnimationFrame(frame); }
  document.querySelectorAll('[data-tree]').forEach(function(tree){
    function collapseBelow(scope){scope.querySelectorAll('[data-branch]').forEach(function(x){x.classList.add('collapsed');});scope.querySelectorAll('[data-group]').forEach(function(x){x.classList.add('group-collapsed');});scope.querySelectorAll('.tree-detail.show').forEach(function(x){x.classList.remove('show');});scope.querySelectorAll('.tree-node.item.detail-open').forEach(function(x){x.classList.remove('detail-open');});}
    tree.querySelectorAll('.tree-node.branch').forEach(function(n){n.addEventListener('click',function(){var b=n.closest('[data-branch]'),closed=b.classList.toggle('collapsed');if(closed)collapseBelow(b);animateTrees();});});
    var root=tree.querySelector('.tree-node.root'); if(root)root.addEventListener('click',function(){var closed=tree.classList.toggle('root-collapsed');if(closed)collapseBelow(tree);animateTrees();});
    tree.querySelectorAll('.tree-node.group').forEach(function(n){n.addEventListener('click',function(){var g=n.closest('[data-group]'),closed=g.classList.toggle('group-collapsed');if(closed)collapseBelow(g);animateTrees();});});
    tree.querySelectorAll('.tree-node.item').forEach(function(n){n.addEventListener('click',function(){
      var detail=n.parentElement.querySelector('.tree-detail'), opening=!detail.classList.contains('show');
      detail.classList.toggle('show',opening); n.classList.toggle('detail-open',opening); animateTrees();
    });});
  });
  document.querySelectorAll('.mindmap-page .stage').forEach(function(scroller){
    var down=false,x=0,y=0,left=0,top=0;
    scroller.addEventListener('pointerdown',function(e){if(e.button!==0||e.target.closest('button,.tree-node'))return;down=true;x=e.clientX;y=e.clientY;left=scroller.scrollLeft;top=scroller.scrollTop;scroller.classList.add('dragging');scroller.setPointerCapture(e.pointerId);});
    scroller.addEventListener('pointermove',function(e){if(!down)return;scroller.scrollLeft=left-(e.clientX-x);scroller.scrollTop=top-(e.clientY-y);});
    function stop(e){down=false;scroller.classList.remove('dragging');try{scroller.releasePointerCapture(e.pointerId);}catch(_){}}
    scroller.addEventListener('pointerup',stop);scroller.addEventListener('pointercancel',stop);
  });
  window.addEventListener('resize',drawTrees);
  window.addEventListener('load',drawTrees);
  requestAnimationFrame(drawTrees);
  // 生成済みページも、会議中のdata.json更新を検知して自動更新する。
  if(location.protocol==='http:'||location.protocol==='https:'){
    let reloadPending=false;
    setInterval(async function(){if(reloadPending)return;try{
      const r=await fetch('/data.json?t='+Date.now(),{cache:'no-store'}),d=await r.json();
      if(d.updated && String(d.updated)!==String(GENERATED_UPDATED)){reloadPending=true;setTimeout(function(){location.reload();},1400);}
    }catch(e){}},3000);
  }
  window.addEventListener('beforeprint',function(){
    document.querySelectorAll('[data-tree]').forEach(function(t){t.classList.remove('root-collapsed');});
    document.querySelectorAll('[data-branch]').forEach(function(b){b.classList.remove('collapsed');}); drawTrees();
  });

  // 図形（Mermaid）をマイニチブルー配色で描画。崩れたら代替表示にして本体は壊さない。
  function mmdFallback(el){ el.classList.add('mmd-fail');
    el.innerHTML='<div class="mmd-note">（図の描画に失敗しました）</div>'; }
  (function(){
    var nodes=[].slice.call(document.querySelectorAll('.mermaid'));
    if(!nodes.length) return;
    if(typeof mermaid==='undefined'){ nodes.forEach(mmdFallback); return; }
    try{
      // 図の配色もテーマに追従（mainichi=マイニチブルー / sponsaru=ネイビー×オレンジ）
      var spon = document.body.dataset.theme === 'sponsaru';
      mermaid.initialize({ startOnLoad:false, securityLevel:'loose', theme:'base',
        themeVariables: spon ? {
          fontFamily:'"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif', fontSize:'20px',
          primaryColor:'#fdeee5', primaryBorderColor:'#f15a24', primaryTextColor:'#15233f',
          lineColor:'#15233f', secondaryColor:'#f5f7fa', tertiaryColor:'#eef1f5',
          clusterBkg:'#f5f7fa', clusterBorder:'#e3e8ef'
        } : {
          fontFamily:'"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif', fontSize:'20px',
          primaryColor:'#e0f4fd', primaryBorderColor:'#00A0E9', primaryTextColor:'#12232e',
          lineColor:'#0079b3', secondaryColor:'#eef7fd', tertiaryColor:'#f3f8fc',
          clusterBkg:'#f3f8fc', clusterBorder:'#dde8f1'
        }});
    }catch(e){}
    (async function(){
      for(var i=0;i<nodes.length;i++){
        var el=nodes[i], code=(el.textContent||'').trim();
        try{ var r=await mermaid.render('mmd'+i, code); el.innerHTML=r.svg; el.classList.add('mmd-done'); }
        catch(e){ mmdFallback(el); }
      }
    })();
  })();
</script>
</body>
</html>
